name: SyndiKit
on:
  push:
    branches-ignore:
      - '*WIP'
      
jobs:
  build-ubuntu:
    name: Build on Ubuntu
    env:
      PACKAGE_NAME: SyndiKit
    runs-on: ubuntu-latest
    container: ${{ matrix.swift.nightly && format('swiftlang/swift:nightly-{0}-noble', matrix.swift.version) || format('swift:{0}', matrix.swift.version) }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      matrix:
        os: [noble, jammy]
        swift:
          - version: "5.10"
          - version: "6.0"
          - version: "6.1"
          - version: "6.2"
          - version: "6.3"
            nightly: true
    steps:
      - uses: actions/checkout@v4
      - uses: brightdigit/swift-build@77-swift-testing-for-wasm
        with:
          scheme: ${{ env.PACKAGE_NAME }}
          skip-package-resolved: ${{ contains(matrix.swift.version, '5.') }}
      - uses: sersoft-gmbh/swift-coverage-action@v4
        id: coverage-files
        with:
          fail-on-empty-output: true
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          flags: swift-${{ matrix.swift.version }},ubuntu
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ join(fromJSON(steps.coverage-files.outputs.files), ',') }}
  build-wasm:
    name: Build on WASM
    env:
      PACKAGE_NAME: SyndiKit
    runs-on: ubuntu-latest
    container: ${{ matrix.swift.nightly && format('swiftlang/swift:nightly-{0}-{1}', matrix.swift.version, matrix.os) || format('swift:{0}-{1}', matrix.swift.version, matrix.os) }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      fail-fast: false
      matrix:
        os: [noble, jammy]
        type: ["wasm", "wasm-embedded"]
        swift:
          - version: "6.2"
    steps:
      - uses: actions/checkout@v4
      - uses: brightdigit/swift-build@77-swift-testing-for-wasm
        id: build
        with:
          scheme: ${{ env.PACKAGE_NAME }}
          skip-package-resolved: ${{ contains(matrix.swift.version, '5.') }}
          type: ${{ matrix.type }}
      - uses: sersoft-gmbh/swift-coverage-action@v4
        if: steps.build.outputs.contains-code-coverage == 'true'
        id: coverage-files
        with:
          fail-on-empty-output: true
      - name: Upload coverage to Codecov
        if: steps.build.outputs.contains-code-coverage == 'true'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          flags: swift-${{ matrix.swift.version }}-${{ matrix.os }}${{ matrix.swift.nightly && '-nightly' || '' }}
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ join(fromJSON(steps.coverage-files.outputs.files), ',') }}    
  build-macos:
    name: Build on macOS
    env:
      PACKAGE_NAME: SyndiKit
    runs-on: ${{ matrix.runs-on }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # SPM Build Matrix - Xcode 15.4
          - runs-on: macos-14
            xcode: "/Applications/Xcode_15.4.app"

          # SPM Build Matrix - Xcode 16.4
          - runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"

          # SPM Build Matrix - Xcode 26.0
          - runs-on: macos-26
            xcode: "/Applications/Xcode_26.0.app"

          # SPM Build Matrix - Xcode 26.1
          - runs-on: macos-26
            xcode: "/Applications/Xcode_26.1.app"

          # SPM Build Matrix - Xcode 26.2
          - runs-on: macos-26
            xcode: "/Applications/Xcode_26.2.app"

          # SPM Build Matrix - Xcode 15.4
          - type: macos
            runs-on: macos-14
            xcode: "/Applications/Xcode_15.4.app"

          # SPM Build Matrix - Xcode 16.4
          - type: macos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"

          # SPM Build Matrix - Xcode 26.0
          - type: macos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.0.app"

          # SPM Build Matrix - Xcode 26.1
          - type: macos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.1.app"

          # SPM Build Matrix - Xcode 26.2
          - type: macos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.2.app"

          # iOS Build Matrix - Xcode 15.4
          - type: ios
            runs-on: macos-14
            xcode: "/Applications/Xcode_15.4.app"
            deviceName: "iPhone 15 Pro"
            osVersion: "17.5"

          # iOS Build Matrix - Xcode 16.4
          - type: ios
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "iPhone 16 Pro"
            osVersion: "18.6"

          # iOS Build Matrix - Xcode 26.0
          - type: ios
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.0.app"
            deviceName: "iPhone 17 Pro"
            osVersion: "26.0.1"

          # iOS Build Matrix - Xcode 26.1
          - type: ios
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.1.app"
            deviceName: "iPhone 17 Pro"
            osVersion: "26.1"

          # iOS Build Matrix - Xcode 26.2
          - type: ios
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.2.app"
            deviceName: "iPhone 17 Pro"
            osVersion: "26.2"

          # watchOS Build Matrix - Xcode 15.4
          - type: watchos
            runs-on: macos-14
            xcode: "/Applications/Xcode_15.4.app"
            deviceName: "Apple Watch Series 9 (41mm)"
            osVersion: "10.5"

          # watchOS Build Matrix - Xcode 16.4
          - type: watchos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple Watch Ultra 2 (49mm)"
            osVersion: "11.5"

          # watchOS Build Matrix - Xcode 26.0
          - type: watchos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.0.app"
            deviceName: "Apple Watch Ultra 3 (49mm)"
            osVersion: "26.0"

          # watchOS Build Matrix - Xcode 26.1
          - type: watchos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.1.app"
            deviceName: "Apple Watch Ultra 3 (49mm)"
            osVersion: "26.1"

          # watchOS Build Matrix - Xcode 26.2
          - type: watchos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.2.app"
            deviceName: "Apple Watch Ultra 3 (49mm)"
            osVersion: "26.2"

          # tvOS Build Matrix - Xcode 16.4
          - type: tvos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple TV"
            osVersion: "18.5"

          # tvOS Build Matrix - Xcode 26.0
          - type: tvos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.0.app"
            deviceName: "Apple TV"
            osVersion: "26.0"

          # tvOS Build Matrix - Xcode 26.1
          - type: tvos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.1.app"
            deviceName: "Apple TV"
            osVersion: "26.1"

          # tvOS Build Matrix - Xcode 26.2
          - type: tvos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.2.app"
            deviceName: "Apple TV"
            osVersion: "26.2"

          # visionOS Build Matrix - Xcode 16.4
          - type: visionos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple Vision Pro"
            osVersion: "2.4"

          # visionOS Build Matrix - Xcode 26.0
          - type: visionos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.0.app"
            deviceName: "Apple Vision Pro"
            osVersion: "26.0"

          # visionOS Build Matrix - Xcode 26.1
          - type: visionos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.1.app"
            deviceName: "Apple Vision Pro"
            osVersion: "26.1"

          # visionOS Build Matrix - Xcode 26.2
          - type: visionos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.2.app"
            deviceName: "Apple Vision Pro"
            osVersion: "26.2"

    steps:
      - uses: actions/checkout@v4

      - name: Disable Xcode macro fingerprint validation
        if: ${{ contains(matrix.xcode, 'Xcode_15.4') && matrix.type != '' }}
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Build and Test
        uses: brightdigit/swift-build@77-swift-testing-for-wasm
        with:
          scheme: ${{ env.PACKAGE_NAME }}
          type: ${{ matrix.type }}
          xcode: ${{ matrix.xcode }}
          deviceName: ${{ matrix.deviceName }}
          osVersion: ${{ matrix.osVersion }}
          build-only: ${{ contains(matrix.xcode, 'Xcode_15.4') && matrix.type != '' }}
          skip-package-resolved: ${{ contains(matrix.xcode, 'Xcode_15.4') }}

      # Common Coverage Steps
      - name: Process Coverage
        uses: sersoft-gmbh/swift-coverage-action@v4

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.type && format('{0}{1}', matrix.type, matrix.osVersion) || 'spm' }}

  build-windows:
    name: Build on Windows
    env:
      PACKAGE_NAME: SyndiKit
    runs-on: ${{ matrix.runs-on }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: windows-2022
            swift:
              version: swift-6.1-release
              build: 6.1-RELEASE

          - runs-on: windows-2022
            swift:
              version: swift-6.2-release
              build: 6.2-RELEASE

          - runs-on: windows-2025
            swift:
              version: swift-6.1-release
              build: 6.1-RELEASE

          - runs-on: windows-2025
            swift:
              version: swift-6.2-release
              build: 6.2-RELEASE

    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        uses: brightdigit/swift-build@77-swift-testing-for-wasm
        with:
          scheme: ${{ env.PACKAGE_NAME }}
          windows-swift-version: ${{ matrix.swift.version }}
          windows-swift-build: ${{ matrix.swift.build }}

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: windows,swift-${{ matrix.swift.version }}

  build-android:
    name: Build on Android
    env:
      PACKAGE_NAME: SyndiKit
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      fail-fast: false
      matrix:
        swift-version: ["6.1"]
        # Testing API 21+ (64-bit architectures) to avoid zlib linking issues on 32-bit ARM
        # See: https://github.com/android/ndk/issues/1391
        api-level: [28, 33, 34]

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          sudo docker image prune --all --force

      - name: Build and Test
        uses: brightdigit/swift-build@77-swift-testing-for-wasm
        with:
          scheme: ${{ env.PACKAGE_NAME }}
          type: android
          android-swift-version: ${{ matrix.swift-version }}
          android-api-level: ${{ matrix.api-level }}
          android-run-tests: true
          android-copy-files: Data/

  lint:
    name: Linting
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    runs-on: ubuntu-latest
    needs: [build-ubuntu, build-wasm, build-macos, build-windows, build-android]
    env:
      MINT_PATH: .mint/lib
      MINT_LINK_PATH: .mint/bin
    steps:
      - uses: actions/checkout@v4    
      - name: Cache mint
        id: cache-mint
        uses: actions/cache@v4  
        env:
          cache-name: cache
        with:
          path: |
            .mint
            Mint         
          key: ${{ runner.os }}-mint-${{ hashFiles('**/Mintfile') }}
          restore-keys: |
            ${{ runner.os }}-mint-  
      - name: Install mint
        if: steps.cache-mint.outputs.cache-hit == ''
        run: |
          git clone https://github.com/yonaskolb/Mint.git
          cd Mint
          swift run mint install yonaskolb/mint
      - name: Lint
        run: ./Scripts/lint.sh

  swift-source-compat-suite:
    name: Test Swift 6.x For Source Compatibility Suite
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    strategy:
      matrix:
        container:
          - swift:6.0
          - swift:6.1
          - swift:6.2
          - swiftlang/swift:nightly-6.3-noble
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift 6.x tests
        run: swift build --disable-sandbox --verbose --configuration release -Xswiftc -swift-version -Xswiftc 6
