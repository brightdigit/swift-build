# Swift - Build and Test GitHub Action
#
# A comprehensive GitHub Action for building and testing Swift packages across multiple platforms.
# Provides intelligent caching, multi-platform support, and optimized workflows for both
# Swift Package Manager (SPM) and Xcode-based builds.
#
# Key Features:
# - Multi-platform support: Ubuntu (Swift 5.9-6.2), macOS (Xcode 15.1+), Windows (Swift 6.1+), Android (Swift 6.2+), and WebAssembly (Swift 6.2.3+)
# - Intelligent caching: Platform-specific strategies for optimal performance
# - Apple platform testing: iOS, watchOS, tvOS, visionOS, macOS with simulator support
# - Android platform testing: Emulator-based testing with Swift Android SDK
# - WebAssembly compilation: Standard Wasm and Wasm-embedded targets with Wasmtime testing, configurable compiler flags (code coverage not supported)
# - Automatic platform downloads for missing Apple platforms
# - Windows Swift toolchain installation and configuration
# - Android Swift SDK with NDK integration
# - Optimized for GitHub Actions with >85% cache hit rates
#
# Advantages over alternatives:
# - More comprehensive than swift-actions/setup-swift
# - Better caching strategies than manual xcodebuild scripts
# - Built-in multi-platform matrix support including Android
# - Handles complex Xcode/simulator configurations automatically
# - Integrated Android emulator testing with Swift Android SDK
#
# Supported Platforms:
# - Ubuntu: focal/jammy/noble with Swift 5.9, 6.0, 6.1, 6.2
# - macOS: Xcode 15.1+ with full Apple platform ecosystem support
# - Windows: windows-2022/windows-2025 with Swift 6.1+ via compnerd/gha-setup-swift
# - Android: ubuntu-*/macos-* runners with Swift 6.2+ via skiptools/swift-android-action
# - WebAssembly: ubuntu-*/macos-* runners with Swift 6.2.3+ (wasm and wasm-embedded variants)

name: 'Swift - Build and Test'
description: 'Builds and optionally tests a Swift package on the current platform'

# Marketplace metadata
branding:
  icon: 'package'  # Code/development icon
  color: 'orange'  # Swift's signature orange color

inputs:
  # The directory containing your Swift package (Package.swift file)
  # Examples: '.', 'MyPackage/', 'Sources/MyLibrary'
  # Default: '.' (current directory)
  working-directory:
    description: 'Directory containing the Swift package'
    required: false
    default: '.'

  # The scheme name to build and test (REQUIRED)
  # Must match a scheme defined in your Package.swift or .xcodeproj
  # Examples: 'MyPackage', 'MyLibrary', 'MyApp-iOS'
  scheme:
    description: 'The scheme to build and test'
    required: true

  # Platform type for builds and testing
  # Apple platforms: 'ios', 'watchOS', 'visionOS', 'tvOS', 'macOS'
  # Android platform: 'android' (runs on ubuntu-* or macos-* runners)
  # WebAssembly platforms: 'wasm', 'wasm-embedded' (runs on ubuntu-* or macos-* runners)
  #   Note: Code coverage is NOT supported for Wasm builds
  # Omit this parameter for cross-platform SPM builds
  # Required when using deviceName/osVersion parameters (Apple platforms only)
  type:
    description: 'Build type (ios, watchos, visionos, tvos, macos, android, wasm, wasm-embedded)'
    required: false

  # Path to specific Xcode installation for macOS builds
  # Examples: '/Applications/Xcode_15.1.app', '/Applications/Xcode_16.0.app'
  # Default: Uses system default Xcode when omitted
  # Only used on macOS runners with type parameter
  xcode:
    description: 'Xcode version path for Apple platforms'
    required: false

  # Simulator device name for Apple platform testing
  # Examples: 'iPhone 15', 'Apple Watch Series 9 (45mm)', 'Apple TV 4K (3rd generation)'
  # Must be used together with osVersion parameter
  # Only valid when type parameter is specified
  deviceName:
    description: 'Simulator device name for Apple platforms'
    required: false

  # Simulator OS version for Apple platform testing
  # Examples: '17.0', '10.0', '17.0' (iOS), '7.0' (watchOS), '17.0' (tvOS)
  # Must be used together with deviceName parameter
  # Version must be available for the specified platform type
  osVersion:
    description: 'Simulator OS version for Apple platforms'
    required: false

  # Automatically download missing Apple platforms via xcodebuild
  # Set to 'true' to download iOS, watchOS, tvOS, or visionOS if not installed
  # Only applies to Apple platform builds (when type is specified)
  # Default: 'false' (fails if platform missing)
  download-platform:
    description: 'Whether to download the platform if not available'
    required: false
    default: 'false'

  # Windows Swift toolchain version for Windows runners
  # Examples: 'swift-6.2-branch', 'swift-6.1-release', 'swift-6.0-release'
  # Only used on Windows runners to install specific Swift toolchain
  # Requires windows-swift-build parameter to be specified
  # Maps to 'swift-version' parameter in compnerd/gha-setup-swift
  windows-swift-version:
    description: 'Swift version for Windows Swift toolchain installation'
    required: false

  # Windows Swift build identifier for Windows runners
  # Examples: '6.2-DEVELOPMENT-SNAPSHOT-2025-09-06-a', '6.1-RELEASE'
  # Only used on Windows runners with windows-swift-version parameter
  # Must match available builds for the specified swift-version
  # Maps to 'swift-build' parameter in compnerd/gha-setup-swift
  windows-swift-build:
    description: 'Swift build identifier for Windows Swift toolchain installation'
    required: false

  # Android Swift version for Swift Android SDK
  # Examples: '6.2', 'swift-DEVELOPMENT-SNAPSHOT-2025-10-16-a', 'nightly-main'
  # Only used when type is 'android'
  # Maps to 'swift-version' parameter in skiptools/swift-android-action
  # Default: '6.2'
  android-swift-version:
    description: 'Swift version for Android Swift SDK installation'
    required: false

  # Android API level for emulator testing
  # Examples: '28', '29', '30', '31', '33', '34'
  # Only used when type is 'android' and android-run-tests is 'true'
  # Maps to 'android-api-level' parameter in skiptools/swift-android-action
  # Default: '28'
  android-api-level:
    description: 'Android API level for emulator testing'
    required: false

  # Android NDK version
  # Examples: '26.1.10909125', '25.2.9519653'
  # Only used when type is 'android'
  # Maps to 'ndk-version' parameter in skiptools/swift-android-action
  # Default: Uses skiptools/swift-android-action's default
  android-ndk-version:
    description: 'Android NDK version for Swift Android builds'
    required: false

  # Android emulator testing enablement
  # Set to 'false' to build only without running tests on emulator
  # Required to be 'false' on ARM macOS runners (cannot run nested virtualization)
  # Only used when type is 'android'
  # Default: 'true' (run tests on emulator)
  android-run-tests:
    description: 'Run tests on Android emulator (must be false on ARM macOS)'
    required: false

  # Additional Swift build flags for Android
  # Examples: '-v', '--static-swift-stdlib'
  # Only used when type is 'android'
  # Maps to 'swift-build-flags' parameter in skiptools/swift-android-action
  android-swift-build-flags:
    description: 'Additional Swift build flags for Android builds'
    required: false

  # Additional Swift test flags for Android
  # Examples: '--parallel', '--filter SomeTestSuite'
  # Only used when type is 'android' and android-run-tests is 'true'
  # Maps to 'swift-test-flags' parameter in skiptools/swift-android-action
  android-swift-test-flags:
    description: 'Additional Swift test flags for Android tests'
    required: false

  # Android emulator boot timeout in seconds
  # How long to wait for the Android emulator to boot before failing
  # Only used when type is 'android' and android-run-tests is 'true'
  # Default: '600' (10 minutes)
  android-emulator-boot-timeout:
    description: 'Android emulator boot timeout in seconds'
    required: false

  # Additional files to copy to Android emulator for testing
  # Specify directories or files that tests need to access at runtime
  # Examples: 'Data/', 'Tests/Resources/', 'config.json'
  # Only used when type is 'android' and android-run-tests is 'true'
  # Maps to 'copy-files' parameter in skiptools/swift-android-action
  android-copy-files:
    description: 'Additional files to copy to emulator for testing'
    required: false

  # Additional Swift compiler/linker flags for Wasm
  # Examples: '-Xcc -D_WASI_EMULATED_SIGNAL -Xlinker -lwasi-emulated-mman -Xlinker --initial-memory=536870912'
  # Only used when type is 'wasm' or 'wasm-embedded'
  # Note: WASI emulation flags are required for projects using Foundation/CoreFoundation
  # Memory configuration flags may be needed for test suites with large datasets
  wasm-swift-flags:
    description: 'Additional Swift compiler/linker flags for Wasm builds'
    required: false

  # Wasmtime version for Wasm test execution (optional fallback)
  # Default: Uses WasmKit runtime (bundled with Swift 6.2.3+ toolchains)
  # WasmKit provides instant test execution without external downloads
  # Wasmtime fallback: Specify a specific version (e.g., '27.0.0') to use Wasmtime instead
  # Note: 'latest' is no longer supported - use specific version numbers for reproducibility
  # Binary is automatically cached to avoid ~500MB download per run when using Wasmtime
  wasmtime-version:
    description: 'Optional: Use Wasmtime runtime fallback (specify specific version like "27.0.0"). Default: Uses WasmKit runtime (bundled with Swift 6.2.3+). Note: "latest" is no longer supported.'
    required: false
    default: ''

  # Testing library detection mode for Wasm test execution
  # Auto-detects testing framework by scanning test sources for import statements
  # Values: 'auto' (default), 'swift-testing', 'xctest', 'both', 'none'
  # - auto: Automatically detect by scanning test sources for 'import Testing' vs 'import XCTest'
  # - swift-testing: Force Swift Testing framework (adds --testing-library swift-testing flag)
  # - xctest: Force XCTest framework (no testing library flag)
  # - both: Run tests twice (once for each framework, fails if either fails)
  # - none: Run without testing library flags (for custom test harnesses)
  wasm-testing-library:
    description: 'Testing library detection mode for Wasm tests (auto, swift-testing, xctest, both, none). Default: auto (automatically detect)'
    required: false
    default: 'auto'

  # Additional flags passed to test runner (WasmKit or Wasmtime) during Wasm test execution
  # Examples: '--parallel', '--filter TestSuiteName'
  # Applied after --testing-library flag
  # Security: Only use trusted values (YAML-defined). Never pass untrusted user input.
  wasm-swift-test-flags:
    description: 'Additional flags passed to Wasm test runner (WasmKit/Wasmtime). Example: --parallel'
    required: false
    default: ''

  # Enable xcbeautify for prettified xcodebuild output
  # When enabled, installs and uses xcbeautify to format xcodebuild output
  # Provides human-friendly, colored output and better CI integration
  # Only applies to Apple platform builds (when type parameter is specified)
  # Default: 'false' (disabled)
  use-xcbeautify:
    description: 'Enable xcbeautify for prettified xcodebuild output (Apple platforms only)'
    required: false
    default: 'false'

  # xcbeautify renderer for CI integration
  # Options: 'default', 'github-actions', 'teamcity', 'azure-devops-pipelines'
  # 'github-actions': Highlights warnings/errors in GitHub Actions UI
  # 'teamcity': Uses TeamCity service messages for better integration
  # 'azure-devops-pipelines': Uses Azure DevOps logging commands
  # Only used when use-xcbeautify is 'true' and type parameter is specified
  xcbeautify-renderer:
    description: 'xcbeautify renderer for CI integration (default, github-actions, teamcity, azure-devops-pipelines)'
    required: false
    default: 'default'

  # xcbeautify version to install
  # Specifies which version of xcbeautify to download and install
  # Examples: '2.30.1', '2.29.0', '2.28.0'
  # Only used when use-xcbeautify is 'true' and type parameter is specified
  # Default: '2.30.1' (latest stable version)
  xcbeautify-version:
    description: 'xcbeautify version to install (e.g., 2.30.1, 2.29.0)'
    required: false
    default: '2.30.1'

  # Skip Package.resolved dependency pinning
  # Controls strict dependency pinning behavior in Swift Package Manager builds
  #
  # When 'false' (default - automatic mode):
  # - If Package.resolved exists: Uses --force-resolved-versions for reproducible builds
  # - If Package.resolved missing: Omits --force-resolved-versions (no dependencies to pin)
  # - Cache keys include Package.resolved hash when file exists
  # - Automatically handles packages with no dependencies
  #
  # When 'true' (force skip mode):
  # - Always omits --force-resolved-versions flag to allow latest dependency versions
  # - Removes Package.resolved file temporarily to prevent parsing errors
  # - Cache keys use 'no-resolved' instead of hash
  # - Useful when Package.resolved exists but is corrupt or incompatible
  #
  # Common use cases for 'true':
  # - Testing against latest dependency versions
  # - Package.resolved v3 incompatibility with Swift 5.x toolchains
  # - Corrupt or malformed Package.resolved that prevents builds
  # - Forcing dependency resolution when Package.resolved is outdated
  #
  # Note: Packages without dependencies work automatically with default settings
  #
  # Default: 'false'
  skip-package-resolved:
    description: 'Skip Package.resolved dependency pinning (allows floating dependency versions)'
    required: false
    default: 'false'
    
  # Build-only mode (skip running tests)
  # When enabled, only builds the package/scheme without running tests
  # Useful for validation builds, binary distribution, or CI pipelines that separate build and test stages
  # Works with both SPM builds and Xcode builds
  # Default: 'false' (run tests as normal)
  build-only:
    description: 'Build without running tests'
    required: false
    default: 'false'

  # Save test output to working directory for artifact upload
  # When enabled, test output is saved to files in the working directory
  # Files created: test-output.txt (SPM/Xcode/Android) or wasm-xctest-output.txt + wasm-swift-testing-output.txt (Wasm)
  # Useful for test validation workflows that need to parse test counts or analyze output
  # Output files are saved to working-directory (accessible for artifact upload)
  # Default: 'false' (output not saved, maintains existing behavior)
  save-test-output:
    description: 'Save test output to working directory for artifact upload. Useful for test validation workflows.'
    required: false
    default: 'false'

outputs:
  # Indicates whether this build contains code coverage data
  # Returns 'true' for SPM and Xcode builds with tests enabled
  # Returns 'false' for Wasm builds (not supported), Android builds (handled separately), and build-only mode
  # Use this output to conditionally run coverage collection actions
  contains-code-coverage:
    description: 'Whether this build contains code coverage data'
    value: ${{ steps.set-coverage-flag.outputs.enabled }}

runs:
  using: "composite"
  steps:
    # OS Detection and Environment Setup
    # This step determines the build strategy based on the GitHub runner operating system.
    # macOS runners: Enable Xcode-based builds with derived data caching for Apple platforms
    # Ubuntu runners: Use Swift Package Manager with standard .build directory caching
    # Windows runners: Use Swift Package Manager with Windows-specific toolchain support
    # The DERIVED_DATA_PATH environment variable optimizes Xcode build performance and caching
    - name: Detect OS
      shell: bash
      id: detect-os
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Determine effective build type (explicit or auto-detected)
        EFFECTIVE_TYPE="${{ inputs.type }}"

        # Auto-detect Android if type is not explicitly set
        if [[ -z "$EFFECTIVE_TYPE" ]]; then
          # Check if ANY Android parameter is set (non-empty)
          if [[ -n "${{ inputs.android-swift-version }}" ]] || \
             [[ -n "${{ inputs.android-api-level }}" ]] || \
             [[ -n "${{ inputs.android-ndk-version }}" ]] || \
             [[ -n "${{ inputs.android-run-tests }}" ]] || \
             [[ -n "${{ inputs.android-swift-build-flags }}" ]] || \
             [[ -n "${{ inputs.android-swift-test-flags }}" ]] || \
             [[ -n "${{ inputs.android-emulator-boot-timeout }}" ]]; then
            echo "Android build auto-detected from Android parameters"
            EFFECTIVE_TYPE="android"
          fi
        fi

        # Determine OS based on effective type
        if [[ "$EFFECTIVE_TYPE" == "android" ]]; then
          # Android builds use Swift Android SDK via skiptools/swift-android-action
          # Runs on ubuntu-* or macos-* runners with Android emulator or build-only mode
          # ARM macOS runners (macos-14, macos-15) require android-run-tests: false
          echo "os=android" >> $GITHUB_OUTPUT
          if [[ -z "${{ inputs.type }}" ]]; then
            echo "Detected Android build mode (auto-detected from Android parameters)"
          else
            echo "Detected Android build mode (type: android)"
          fi
        elif [[ "$EFFECTIVE_TYPE" == "wasm" ]] || [[ "$EFFECTIVE_TYPE" == "wasm-embedded" ]]; then
          # Wasm builds use Swift Package Manager with --swift-sdk flag
          # Runs on ubuntu-* or macos-* runners (Windows not supported but will fail naturally)
          echo "os=wasm" >> $GITHUB_OUTPUT
          echo "wasm-variant=$EFFECTIVE_TYPE" >> $GITHUB_OUTPUT
          echo "Detected Wasm build mode (type: $EFFECTIVE_TYPE)"
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          # macOS runners support both SPM and Xcode builds
          # Set up derived data path for optimal Xcode build performance and caching
          echo "os=macos" >> $GITHUB_OUTPUT
          echo "DERIVED_DATA_PATH=$RUNNER_TEMP/DerivedData" >> $GITHUB_ENV
        elif [[ "$RUNNER_OS" == "Windows" ]]; then
          # Windows runners support SPM builds with custom Swift toolchain installation
          # Will use Swift Package Manager with Windows-specific caching strategies
          echo "os=windows" >> $GITHUB_OUTPUT
        elif [[ "$RUNNER_OS" == "Linux" ]]; then
          # Ubuntu runners only support SPM builds (no Xcode available)
          # Will use standard Swift Package Manager build and cache directories
          echo "os=ubuntu" >> $GITHUB_OUTPUT
        else
          echo "Unsupported operating system: $RUNNER_OS" >&2
          exit 1
        fi

    # Package.resolved Detection and Hash Computation
    # This step determines whether to use Package.resolved for dependency pinning
    # and computes a cache key component that's consistent across all caching strategies.
    #
    # Decision Logic:
    # - If skip-package-resolved is 'true': Use 'no-resolved' (floating dependencies allowed)
    # - If Package.resolved doesn't exist: Use 'no-resolved' (no dependencies to pin)
    # - Otherwise: Use actual file hash (pinned dependencies)
    #
    # Outputs:
    # - resolved-hash: The hash to use in cache keys ('no-resolved' or actual hash)
    # - use-resolved: 'true' if using Package.resolved, 'false' otherwise
    #
    # This centralized approach ensures consistent cache behavior and prevents
    # empty hash strings when Package.resolved is missing
    #
    # Corrupt Package.resolved Handling:
    # If Package.resolved exists but is corrupt or incompatible (e.g., v3 format with Swift 5.x),
    # set skip-package-resolved: 'true' to bypass validation and use floating dependencies.
    # The hash computation will succeed even with corrupt files, but the build may fail later
    # when Swift attempts to parse the file. Using skip-package-resolved bypasses this issue.
    - name: Detect Package.resolved
      shell: bash
      id: detect-resolved
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [[ "${{ inputs.skip-package-resolved }}" == "true" ]]; then
          # User explicitly requested to skip Package.resolved
          echo "resolved-hash=no-resolved" >> $GITHUB_OUTPUT
          echo "use-resolved=false" >> $GITHUB_OUTPUT
          echo "Skipping Package.resolved (skip-package-resolved=true)"
        elif [[ ! -f "Package.resolved" ]]; then
          # Package.resolved doesn't exist (likely no dependencies)
          echo "resolved-hash=no-resolved" >> $GITHUB_OUTPUT
          echo "use-resolved=false" >> $GITHUB_OUTPUT
          echo "Package.resolved not found (no dependencies or not committed)"
        else
          # Package.resolved exists and should be used
          # Compute hash for cache key using portable method
          if command -v shasum >/dev/null 2>&1; then
            RESOLVED_HASH=$(shasum -a 256 Package.resolved | cut -d' ' -f1)
          elif command -v sha256sum >/dev/null 2>&1; then
            RESOLVED_HASH=$(sha256sum Package.resolved | cut -d' ' -f1)
          elif command -v md5sum >/dev/null 2>&1; then
            # Fallback to MD5 if SHA-256 is unavailable (better than file metadata)
            RESOLVED_HASH=$(md5sum Package.resolved | cut -d' ' -f1)
          elif command -v md5 >/dev/null 2>&1; then
            # macOS md5 command format
            RESOLVED_HASH=$(md5 -q Package.resolved)
          else
            # Last resort: use content-based checksum via cksum (POSIX standard)
            # More stable than file metadata and available on all POSIX systems
            RESOLVED_HASH=$(cksum Package.resolved | awk '{print $1"-"$2}')
          fi
          echo "resolved-hash=$RESOLVED_HASH" >> $GITHUB_OUTPUT
          echo "use-resolved=true" >> $GITHUB_OUTPUT
          echo "Using Package.resolved with hash: $RESOLVED_HASH"
        fi

    # Remove Package.resolved when skip-package-resolved is enabled
    # This step deletes Package.resolved when skip-package-resolved=true to prevent
    # Swift from attempting to parse incompatible Package.resolved formats.
    #
    # Why this is necessary:
    # - Swift 5.9 cannot parse Package.resolved v3 format (fails with parsing errors)
    # - Simply omitting --force-resolved-versions is not enough
    # - Swift still tries to read and parse Package.resolved if it exists
    # - Deleting the file allows Swift to resolve dependencies from scratch
    #
    # The file is backed up to a temporary location and will be restored at the end
    # of the job to maintain consistency with the repository state.
    - name: Remove Package.resolved (skip mode)
      if: inputs.skip-package-resolved == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [[ -f "Package.resolved" ]]; then
          echo "Backing up and deleting Package.resolved (skip-package-resolved=true)"
          # Backup to a temporary location for restoration at the end
          cp Package.resolved "$RUNNER_TEMP/Package.resolved.backup"
          rm -f Package.resolved
        else
          echo "Package.resolved not found, nothing to delete"
        fi

    # Package.swift Hash Computation
    # Computes a hash of the Package.swift semantic content to ensure unique cache keys per package.
    # This prevents cache collisions when multiple packages use skip-package-resolved mode
    # or when different packages are built on the same runner.
    #
    # Uses 'swift package dump-package' to generate a canonical JSON representation that ignores:
    # - Whitespace and formatting changes
    # - Comments
    # - Variable names in the manifest
    # - Code organization
    #
    # Only actual changes to dependencies, targets, products, or package configuration
    # will invalidate the cache. This maximizes cache reuse while maintaining correctness.
    #
    # Outputs:
    # - package-hash: The hash of Package.swift semantic content
    #
    # This ensures that each unique Swift package gets its own cache namespace,
    # preventing cache pollution between different projects.
    - name: Compute Package.swift Hash
      shell: bash
      id: package-hash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [[ ! -f "Package.swift" ]]; then
          echo "ERROR: Package.swift not found in working directory" >&2
          exit 1
        fi

        # Use swift package dump-package to get canonical JSON representation
        # This ignores whitespace, comments, and other cosmetic changes
        # Falls back to raw file hash if dump-package fails
        if PACKAGE_JSON=$(swift package dump-package 2>/dev/null); then
          # Hash the canonical JSON output
          if command -v shasum >/dev/null 2>&1; then
            PACKAGE_HASH=$(echo "$PACKAGE_JSON" | shasum -a 256 | cut -d' ' -f1)
          elif command -v sha256sum >/dev/null 2>&1; then
            PACKAGE_HASH=$(echo "$PACKAGE_JSON" | sha256sum | cut -d' ' -f1)
          elif command -v md5sum >/dev/null 2>&1; then
            PACKAGE_HASH=$(echo "$PACKAGE_JSON" | md5sum | cut -d' ' -f1)
          elif command -v md5 >/dev/null 2>&1; then
            PACKAGE_HASH=$(echo "$PACKAGE_JSON" | md5)
          else
            PACKAGE_HASH=$(echo "$PACKAGE_JSON" | cksum | awk '{print $1"-"$2}')
          fi
          echo "Using semantic Package.swift hash (from dump-package)"
        else
          # Fallback: hash the raw file if dump-package fails
          echo "Warning: 'swift package dump-package' failed, using raw file hash" >&2
          if command -v shasum >/dev/null 2>&1; then
            PACKAGE_HASH=$(shasum -a 256 Package.swift | cut -d' ' -f1)
          elif command -v sha256sum >/dev/null 2>&1; then
            PACKAGE_HASH=$(sha256sum Package.swift | cut -d' ' -f1)
          elif command -v md5sum >/dev/null 2>&1; then
            PACKAGE_HASH=$(md5sum Package.swift | cut -d' ' -f1)
          elif command -v md5 >/dev/null 2>&1; then
            PACKAGE_HASH=$(md5 -q Package.swift)
          else
            PACKAGE_HASH=$(cksum Package.swift | awk '{print $1"-"$2}')
          fi
          echo "Using raw Package.swift file hash (fallback)"
        fi

        echo "package-hash=$PACKAGE_HASH" >> $GITHUB_OUTPUT
        echo "Package.swift hash: $PACKAGE_HASH"

    # Set Code Coverage Flag
    # Determines whether code coverage will be collected for this build
    # Coverage is NOT supported for:
    # - Wasm builds (no libclang_rt.profile-wasm32.a available)
    # - Android builds (handled separately by swift-android-action)
    # - Build-only mode (no tests run)
    - name: Set Coverage Flag
      shell: bash
      id: set-coverage-flag
      run: |
        if [[ "${{ steps.detect-os.outputs.os }}" == "wasm" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Code coverage: disabled (Wasm not supported)"
        elif [[ "${{ steps.detect-os.outputs.os }}" == "android" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Code coverage: disabled (Android handled separately)"
        elif [[ "${{ inputs.build-only }}" == "true" ]]; then
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "Code coverage: disabled (build-only mode)"
        else
          echo "enabled=true" >> $GITHUB_OUTPUT
          echo "Code coverage: enabled"
        fi

    # macOS Xcode Configuration Steps
    # These steps only execute on macOS runners when Apple platform builds are requested.
    # They configure the Xcode toolchain, map platform types to SDK/simulator names,
    # and optionally download missing Apple platforms.

    # Configure the Xcode developer directory for the build environment
    # Sets DEVELOPER_DIR to point to the specific Xcode installation's Developer directory
    # This ensures all Xcode tools (xcodebuild, xcrun, etc.) use the correct toolchain
    # Essential for environments with multiple Xcode versions installed
    - name: Setup Xcode
      if: (steps.detect-os.outputs.os == 'macos' || steps.detect-os.outputs.os == 'wasm') && inputs.xcode && runner.os == 'macOS'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: echo "DEVELOPER_DIR=${{ inputs.xcode }}/Contents/Developer" >> $GITHUB_ENV

    # Setup Swift.org toolchain for Wasm builds on macOS
    # Xcode's Swift doesn't include Wasm backend - must use Swift.org toolchain
    - name: Setup Swift.org Toolchain for Wasm (macOS)
      if: steps.detect-os.outputs.os == 'wasm' && runner.os == 'macOS'
      shell: bash
      run: |
        echo "Setting up Swift.org toolchain for Wasm support..."

        # First detect Swift version from Xcode to know which version to install
        SWIFT_VERSION_RAW=$(swift --version 2>&1 | head -n 1)
        echo "Xcode Swift version: $SWIFT_VERSION_RAW"

        # Parse Swift version using centralized script
        SWIFT_VERSION=$(echo "$SWIFT_VERSION_RAW" | "$GITHUB_ACTION_PATH/scripts/parse-swift-version.sh")
        if [ $? -ne 0 ]; then
          echo "ERROR: Failed to parse Swift version"
          exit 1
        fi

        echo "Detected Swift version: $SWIFT_VERSION"
        echo "Installing matching Swift.org toolchain..."

        # Install swiftly if not present
        if ! command -v swiftly &> /dev/null; then
          echo "Installing swiftly..."
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg && \
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory && \
          ~/.swiftly/bin/swiftly init --quiet-shell-followup && \
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh" && \
          hash -r
          export PATH="$HOME/.swiftly/bin:$PATH"
        else
          echo "swiftly already installed"
        fi

        # Verify swiftly installation
        swiftly --version

        # Install Swift.org toolchain matching the Xcode version
        echo "Installing Swift $SWIFT_VERSION via swiftly..."
        swiftly install $SWIFT_VERSION

        # Select and activate the installed toolchain for the current shell
        # 'swiftly use' sets up PATH and makes this Swift version active
        echo "Selecting Swift $SWIFT_VERSION toolchain..."
        swiftly use $SWIFT_VERSION

        # Export swiftly bin PATH for subsequent steps
        # This ensures 'swift' command continues to use Swift.org toolchain
        echo "$HOME/.swiftly/bin" >> $GITHUB_PATH

        # Unset DEVELOPER_DIR to ensure we use Swift.org toolchain, not Xcode
        # This prevents Xcode's Swift from taking precedence
        echo "Unsetting DEVELOPER_DIR to use Swift.org toolchain"
        echo "DEVELOPER_DIR=" >> $GITHUB_ENV

        # Verify Swift version from new toolchain
        # Should now show Swift.org toolchain (not "Apple Swift version")
        echo "Swift.org toolchain version:"
        swift --version

    # Get Xcode version from the actual Xcode installation being used
    # This ensures accurate version detection regardless of path format
    # Uses DEVELOPER_DIR when available, falls back to system default
    # The DEVELOPER_DIR environment variable ensures xcodebuild uses the correct Xcode
    - name: Set Xcode Version
      if: steps.detect-os.outputs.os == 'macos'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Get Xcode version from the actual installation
        # This works for both custom Xcode paths and system default
        # DEVELOPER_DIR is set above if a custom Xcode path was provided
        
        # Check if xcodebuild exists and is accessible
        if ! command -v xcodebuild >/dev/null 2>&1; then
          echo "Error: xcodebuild command not found in PATH" >&2
          exit 0
        fi
        
        # Method 1: Try xcodebuild command
        if XCODE_VERSION=$(timeout 30 xcodebuild -version 2>&1 | head -1 | cut -d' ' -f2); then
          echo "XCODE_NAME=$XCODE_VERSION" >> $GITHUB_ENV
        else
          # Method 2: Try to read from Xcode Info.plist
          if [ -n "${{ inputs.xcode }}" ] && [ -f "${{ inputs.xcode }}/Contents/Info.plist" ]; then
            if XCODE_VERSION=$(defaults read "${{ inputs.xcode }}/Contents/Info.plist" CFBundleShortVersionString 2>/dev/null); then
              echo "XCODE_NAME=$XCODE_VERSION" >> $GITHUB_ENV
            fi
          else
            # Method 3: Try system default Xcode
            if [ -f "/Applications/Xcode.app/Contents/Info.plist" ]; then
              if XCODE_VERSION=$(defaults read "/Applications/Xcode.app/Contents/Info.plist" CFBundleShortVersionString 2>/dev/null); then
                echo "XCODE_NAME=$XCODE_VERSION" >> $GITHUB_ENV
              fi
            fi
          fi
        fi

    # Map platform type parameter to Xcode SDK and platform destination strings
    # This critical step translates user-friendly type inputs into the specific
    # SDK and platform identifiers required by xcodebuild commands.
    #
    # Platform Mapping Logic:
    # - 'ios' → SDK='iphonesimulator', PLATFORM='iOS Simulator'
    # - 'watchos' → SDK='watchsimulator', PLATFORM='watchOS Simulator'
    # - 'visionos' → SDK='xrsimulator', PLATFORM='visionOS Simulator'
    # - 'tvos' → SDK='appletvsimulator', PLATFORM='tvOS Simulator'
    # - 'macos' → SDK='macosx', PLATFORM='macOS' (no simulator, native)
    #
    # These environment variables are used later in xcodebuild destination strings
    # and -sdk parameters to target the correct platform for testing
    - name: Set SDK and Platform
      if: steps.detect-os.outputs.os == 'macos' && inputs.type
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        case ${{ inputs.type }} in
          ios)
            echo "PLATFORM=iOS Simulator" >> $GITHUB_ENV
            echo "SDK=iphonesimulator" >> $GITHUB_ENV
            ;;
          watchos)
            echo "PLATFORM=watchOS Simulator" >> $GITHUB_ENV
            echo "SDK=watchsimulator" >> $GITHUB_ENV
            ;;
          visionos)
            echo "PLATFORM=visionOS Simulator" >> $GITHUB_ENV
            echo "SDK=xrsimulator" >> $GITHUB_ENV
            ;;
          tvos)
            echo "PLATFORM=tvOS Simulator" >> $GITHUB_ENV
            echo "SDK=appletvsimulator" >> $GITHUB_ENV
            ;;
          macos)
            echo "PLATFORM=macOS" >> $GITHUB_ENV
            echo "SDK=macosx" >> $GITHUB_ENV
            ;;
        esac

    # Wasm Swift Version Detection
    # This step detects the installed Swift version and constructs the Wasm SDK name.
    # Only executes for Wasm builds (when type is 'wasm' or 'wasm-embedded').
    # IMPORTANT: This happens AFTER Xcode setup to use the correct Swift version.
    #
    # Outputs:
    # - swift-version: The detected Swift version (e.g., "6.2.3")
    # - wasm-sdk: The SDK name to use (e.g., "swift-6.2.3-RELEASE_wasm")
    #
    # The SDK name format is: swift-{VERSION}-RELEASE_wasm (both variants use same SDK)
    # No version validation is performed - installation will fail naturally if version is unsupported.
    - name: Detect Swift Version for Wasm
      if: steps.detect-os.outputs.os == 'wasm'
      shell: bash
      id: detect-swift-version
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Extract Swift version with full patch number (e.g., "6.2.3")
        # swift --version outputs formats like:
        #   "Swift version 6.2.3 (swift-6.2.3-RELEASE)"
        #   "swift-driver version: 1.127.14.1 Swift version 6.2 (swift-6.2.3-RELEASE)"
        SWIFT_VERSION_RAW=$(swift --version 2>&1 | head -n 1)
        echo "Raw version output: $SWIFT_VERSION_RAW"

        # Parse Swift version using centralized script
        # Wasm requires Swift 6.2.3+ with full version number (major.minor.patch)
        SWIFT_VERSION=$(echo "$SWIFT_VERSION_RAW" | "$GITHUB_ACTION_PATH/scripts/parse-swift-version.sh")
        if [ $? -ne 0 ]; then
          echo "ERROR: Could not parse full Swift version (with patch) from: $SWIFT_VERSION_RAW"
          echo "Wasm requires Swift 6.2.3+ with full version number in swift --version output"
          exit 1
        fi

        # Construct SDK name - both wasm and wasm-embedded use the same SDK bundle
        # The embedded variant is included in the wasm SDK package
        # Format: swift-{VERSION}-RELEASE_wasm (contains both wasm and wasm-embedded)
        WASM_VARIANT="${{ steps.detect-os.outputs.wasm-variant }}"
        SDK_NAME="swift-${SWIFT_VERSION}-RELEASE_wasm"

        echo "swift-version=$SWIFT_VERSION" >> $GITHUB_OUTPUT
        echo "wasm-sdk=$SDK_NAME" >> $GITHUB_OUTPUT
        echo "Detected Swift $SWIFT_VERSION, will use SDK: $SDK_NAME"

    # Install required Linux packages for Wasm operations
    # This step installs curl and xz-utils needed for Wasm SDK and Wasmtime operations.
    # Runs once early in the Wasm workflow to avoid redundant apt-get updates.
    # Only executes on Linux systems when Wasm type is detected.
    - name: Install Wasm Dependencies
      if: steps.detect-os.outputs.os == 'wasm' && (runner.os == 'Linux' || startsWith(runner.os, 'linux'))
      shell: bash
      run: |
        # Check if packages are already installed
        MISSING_PACKAGES=""
        if ! command -v curl >/dev/null 2>&1; then
          MISSING_PACKAGES="$MISSING_PACKAGES curl"
        fi
        if ! command -v xz >/dev/null 2>&1; then
          MISSING_PACKAGES="$MISSING_PACKAGES xz-utils"
        fi

        # Install missing packages in single apt-get update
        if [[ -n "$MISSING_PACKAGES" ]]; then
          echo "Installing required packages:$MISSING_PACKAGES"
          apt-get update -qq
          apt-get install -y -qq $MISSING_PACKAGES
        else
          echo "All required packages (curl, xz-utils) are already installed"
        fi

    # Wasm SDK Installation
    # This step downloads and installs the Wasm SDK bundle for the detected Swift version.
    # Only executes for Wasm builds (when type is 'wasm' or 'wasm-embedded').
    # Happens AFTER Xcode setup to ensure correct Swift toolchain is used.
    #
    # Downloads using curl (preferred) or wget (fallback), then installs from local file.
    # Installing from local file doesn't require a checksum (which isn't published by Swift.org).
    # The installed SDK is cached for subsequent builds.
    #
    # SDK URL format: https://download.swift.org/swift-{version}-release/wasm-sdk/swift-{version}-RELEASE/swift-{version}-RELEASE_wasm.artifactbundle.tar.gz
    - name: Install Wasm SDK
      if: steps.detect-os.outputs.os == 'wasm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        SDK_NAME="${{ steps.detect-swift-version.outputs.wasm-sdk }}"
        SWIFT_VERSION="${{ steps.detect-swift-version.outputs.swift-version }}"

        echo "Installing Wasm SDK: $SDK_NAME"

        # The SDK download URL pattern from Swift.org
        # Format: https://download.swift.org/swift-{version}-release/wasm-sdk/swift-{version}-RELEASE/swift-{version}-RELEASE_wasm.artifactbundle.tar.gz
        SDK_URL="https://download.swift.org/swift-${SWIFT_VERSION}-release/wasm-sdk/swift-${SWIFT_VERSION}-RELEASE/${SDK_NAME}.artifactbundle.tar.gz"

        echo "Downloading from: $SDK_URL"

        # Download SDK (use wget if curl not available)
        if command -v curl >/dev/null 2>&1; then
          curl -L "$SDK_URL" -o /tmp/wasm-sdk.tar.gz
        elif command -v wget >/dev/null 2>&1; then
          wget -O /tmp/wasm-sdk.tar.gz "$SDK_URL"
        else
          echo "ERROR: Neither curl nor wget available to download Wasm SDK"
          exit 1
        fi

        # Install SDK from local file (doesn't require checksum)
        swift sdk install /tmp/wasm-sdk.tar.gz

        # Verify installation
        echo "Installed SDKs:"
        swift sdk list

        echo "Wasm SDK installed successfully"

    # Automatically download missing Apple platform support (optional)
    # This step executes only when download-platform is set to 'true' and runs
    # xcodebuild -downloadPlatform to install missing platform SDKs and simulators.
    #
    # Platform Download Behavior:
    # - Downloads the complete platform SDK and simulator runtime
    # - Only downloads if the platform is not already installed
    # - macOS platform is always available (no download needed)
    # - Requires internet connectivity and may take several minutes
    # - Fails gracefully if download is unsuccessful
    #
    # Use Cases:
    # - Fresh GitHub runners missing specific platform support
    # - Custom Xcode installations with limited platform coverage
    # - Ensuring consistent platform availability across different runner configurations
    #
    # Performance Impact: First-time downloads can add 5-15 minutes to workflow runtime
    # but subsequent builds benefit from pre-installed platforms
    - name: Download Platform
      if: steps.detect-os.outputs.os == 'macos' && inputs.type && inputs.type != 'macos' && inputs.download-platform == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Fix for iOS simulator connection issue (https://github.com/actions/runner-images/issues/12862)
        # Establish simulator connection before running xcodebuild
        xcrun simctl list > /dev/null
        case ${{ inputs.type }} in
          ios)
            xcodebuild -downloadPlatform iOS
            ;;
          watchos)
            xcodebuild -downloadPlatform watchOS
            ;;
          visionos)
            xcodebuild -downloadPlatform visionOS
            ;;
          tvos)
            xcodebuild -downloadPlatform tvOS
            ;;
        esac

    # Windows Swift Toolchain Installation
    # This step only executes on Windows runners when windows-swift-version is provided.
    # Uses the compnerd/gha-setup-swift action to install the specified Swift toolchain.
    # See: https://github.com/compnerd/gha-setup-swift for detailed parameter documentation
    #
    # Installation Process:
    # - Downloads and installs the specified Swift toolchain version
    # - Configures the Windows environment for Swift development
    # - Sets up necessary paths and environment variables
    #
    # Parameter Mapping:
    # - windows-swift-version → swift-version (e.g., swift-6.2-branch, swift-6.1-release)
    # - windows-swift-build → swift-build (e.g., 6.2-DEVELOPMENT-SNAPSHOT-2025-09-06-a, 6.1-RELEASE)
    #
    # This enables Swift development on Windows runners with the exact toolchain
    # version required for your project, ensuring consistency across different environments.
    - name: Install Windows Swift toolchain
      if: steps.detect-os.outputs.os == 'windows' && inputs.windows-swift-version
      uses: compnerd/gha-setup-swift@main
      with:
        swift-version: ${{ inputs.windows-swift-version }}
        swift-build: ${{ inputs.windows-swift-build }}


    # Android NDK Setup
    # Manually configures the Android NDK when a custom version is specified.
    # This follows the guidance from https://github.com/skiptools/swift-android-action/issues/9#issuecomment-3671782993
    #
    # Background:
    # The swift-android-action expects ANDROID_NDK_HOME to be pre-configured when using
    # custom NDK versions. Passing ndk-version directly to the action can cause timing
    # issues where the setup script runs before environment variables are properly set.
    #
    # Approach:
    # 1. Check if the specified NDK version is already installed
    # 2. If installed, set ANDROID_NDK_HOME environment variable
    # 3. If not installed, provide a clear error message
    # 4. Do NOT pass ndk-version parameter to swift-android-action (it will use ANDROID_NDK_HOME)
    #
    # Note: Users must manually install custom NDK versions before using this action.
    # For GitHub Actions runners, you can install the NDK using:
    #   - name: Install NDK
    #     run: |
    #       echo "y" | sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;VERSION"
    #
    # References:
    # - https://github.com/skiptools/swift-android-action/issues/9#issuecomment-3671782993
    # - https://github.com/attaswift/BigInt/blob/master/.github/workflows/swift.yml#L38
    # - https://github.com/marcprux/swift-android-emulator-demo/blob/main/.github/workflows/swift-demo.yml#L20
    - name: Setup Android NDK
      if: steps.detect-os.outputs.os == 'android' && inputs.android-ndk-version
      shell: bash
      run: |
        # Determine Android SDK root based on runner OS
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          ANDROID_SDK_ROOT="$HOME/Library/Android/sdk"
        else
          # Ubuntu/Linux runners
          if [[ -z "${ANDROID_SDK_ROOT}" ]]; then
            # Check both common locations
            if [[ -d "/usr/local/lib/android/sdk" ]]; then
              ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
            elif [[ -d "$HOME/Android/Sdk" ]]; then
              ANDROID_SDK_ROOT="$HOME/Android/Sdk"
            else
              echo "ERROR: Cannot find Android SDK root" >&2
              exit 1
            fi
          fi
        fi

        NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ inputs.android-ndk-version }}"

        echo "Checking for NDK ${{ inputs.android-ndk-version }} at $NDK_PATH"

        # Check if NDK is already installed
        if [[ ! -d "$NDK_PATH" ]]; then
          echo "ERROR: NDK ${{ inputs.android-ndk-version }} not found at $NDK_PATH" >&2
          echo "" >&2
          echo "Please install the NDK before running this action:" >&2
          echo "  - name: Install Android NDK" >&2
          echo "    run: |" >&2
          echo "      echo \"y\" | sudo \${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install \"ndk;${{ inputs.android-ndk-version }}\"" >&2
          echo "" >&2
          echo "Available NDKs:" >&2
          ls -la "$ANDROID_SDK_ROOT/ndk/" 2>&1 || echo "NDK directory not found" >&2
          exit 1
        fi

        echo "Found NDK ${{ inputs.android-ndk-version }} at $NDK_PATH"

        # Verify the NDK has the required structure
        if [[ ! -d "$NDK_PATH/toolchains/llvm/prebuilt" ]]; then
          echo "ERROR: NDK at $NDK_PATH is missing required toolchains/llvm/prebuilt directory" >&2
          echo "NDK structure:" >&2
          ls -la "$NDK_PATH" >&2
          exit 1
        fi

        echo "Setting ANDROID_NDK_HOME to: $NDK_PATH"
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

    # Android Swift Build and Test
    # This step executes only when type is 'android'
    # Uses skiptools/swift-android-action for complete Android build workflow
    #
    # The swift-android-action handles:
    # - Installing Swift toolchain with Android SDK support
    # - Cross-compiling Swift package for Android
    # - Optionally running tests on Android emulator (if android-run-tests is true)
    #
    # Parameter Mapping from our action to swift-android-action:
    # - android-swift-version → swift-version
    # - working-directory → package-path
    # - android-api-level → android-api-level
    # - android-ndk-version → NOT PASSED (NDK is pre-configured via ANDROID_NDK_HOME in Setup Android NDK step)
    # - android-swift-build-flags → swift-build-flags
    # - android-swift-test-flags → swift-test-flags
    # - android-emulator-boot-timeout → android-emulator-boot-timeout
    # - build-only logic:
    #   - build-only: false → build-package: true, build-tests: true, run-tests: <android-run-tests>
    #   - build-only: true → build-package: true, build-tests: false, run-tests: false
    #
    # Platform Compatibility:
    # - Ubuntu runners: Full support (build + test)
    # - Intel macOS runners: Full support (build + test)
    # - ARM macOS runners (macos-14, macos-15): Build only (android-run-tests must be false)
    #
    # Build-Only Mode:
    # When build-only is 'true', we disable both build-tests and run-tests
    # to only compile the package without test targets
    #
    # NDK Configuration:
    # - When android-ndk-version IS specified: NDK is installed and configured via ANDROID_NDK_HOME
    #   in the "Setup Android NDK" step above. The ndk-version parameter is NOT passed to
    #   swift-android-action to avoid timing issues (the action will use pre-configured ANDROID_NDK_HOME)
    # - When android-ndk-version is NOT specified: Uses the runner's default pre-installed NDK
    #   (swift-android-action will use the existing ANDROID_NDK_HOME environment variable)
    - name: Build${{ inputs.build-only == 'true' && '' || ' and Test' }} (Android)
      if: steps.detect-os.outputs.os == 'android'
      uses: skiptools/swift-android-action@v2
      with:
        # Swift toolchain version (supports versions, snapshots, and nightly builds)
        swift-version: ${{ inputs.android-swift-version || '6.2' }}

        # Package directory
        package-path: ${{ inputs.working-directory }}

        # Android emulator configuration (only used when tests are enabled)
        android-api-level: ${{ inputs.android-api-level || '28' }}
        android-emulator-boot-timeout: ${{ inputs.android-emulator-boot-timeout || '600' }}

        # Build control flags
        # Always build the package
        build-package: true
        # Build tests only if not in build-only mode
        build-tests: ${{ inputs.build-only != 'true' }}
        # Run tests only if not in build-only mode AND android-run-tests is true
        run-tests: ${{ inputs.build-only != 'true' && (inputs.android-run-tests || 'true') == 'true' }}

        # Additional build/test flags (optional)
        swift-build-flags: ${{ inputs.android-swift-build-flags }}
        swift-test-flags: ${{ inputs.android-swift-test-flags }}

        # Additional files to copy to emulator for testing
        copy-files: ${{ inputs.android-copy-files }}

    # xcbeautify Installation
    # Installs xcbeautify tool for prettified xcodebuild output when enabled.
    # xcbeautify is a Swift-based alternative to xcpretty that provides:
    # - Human-friendly and colored output for xcodebuild commands
    # - Support for new build system output and parallel testing
    # - GitHub Actions, TeamCity, and Azure DevOps integration
    # - Better CI output formatting and error highlighting
    #
    # Installation Methods:
    # - macOS: Downloads pre-built binary from GitHub releases with caching
    # - Version controlled via xcbeautify-version input parameter
    #
    # Only installs when use-xcbeautify input is set to 'true' AND
    # when building Apple platforms (type parameter is specified)
    - name: Cache xcbeautify
      if: steps.detect-os.outputs.os == 'macos' && inputs.use-xcbeautify == 'true' && inputs.type
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/xcbeautify
        key: xcbeautify-${{ inputs.xcbeautify-version }}
        restore-keys: |
          xcbeautify-

    - name: Install xcbeautify
      if: steps.detect-os.outputs.os == 'macos' && inputs.use-xcbeautify == 'true' && inputs.type
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Create local installation directory
        XCBEAUTIFY_DIR="$RUNNER_TEMP/xcbeautify"
        
        # Check if xcbeautify is already cached and working
        if [ -f "$XCBEAUTIFY_DIR/xcbeautify" ] && "$XCBEAUTIFY_DIR/xcbeautify" --version > /dev/null 2>&1; then
          echo "xcbeautify found in cache, skipping download"
        else
          echo "xcbeautify not found in cache, downloading..."
          mkdir -p "$XCBEAUTIFY_DIR"
          
          # Download the specified xcbeautify binary from GitHub releases
          # Using the user-specified version with universal macOS binary
          XCBEAUTIFY_VERSION="${{ inputs.xcbeautify-version }}"
          XCBEAUTIFY_URL="https://github.com/cpisciotta/xcbeautify/releases/download/${XCBEAUTIFY_VERSION}/xcbeautify-${XCBEAUTIFY_VERSION}-universal-apple-macosx.zip"
          
          # Download and extract the binary
          curl -L -o "$XCBEAUTIFY_DIR/xcbeautify.zip" "$XCBEAUTIFY_URL"
          cd "$XCBEAUTIFY_DIR"
          unzip -q xcbeautify.zip
          
          # The binary is in the release/xcbeautify directory after extraction
          # Move it to the root of our installation directory
          mv release/xcbeautify ./
          rmdir release
          
          # Clean up the zip file to save space
          rm xcbeautify.zip
          
          # Make the binary executable
          chmod +x xcbeautify
        fi
        
        # Verify the installation
        "$XCBEAUTIFY_DIR/xcbeautify" --version
        
        # Add to PATH for this step and subsequent steps
        echo "$XCBEAUTIFY_DIR" >> $GITHUB_PATH

    # Build Type Decision Logic:
    # The action chooses between two build approaches based on the 'type' parameter:
    #
    # 1. Xcode Builds (when 'type' is specified):
    #    - Uses xcodebuild with platform-specific SDK and destination
    #    - Enables simulator testing for iOS/watchOS/tvOS/visionOS
    #    - Leverages derived data caching for optimal performance
    #    - Required for Apple platform testing with specific simulators
    #
    # 2. SPM Builds (when 'type' is omitted):
    #    - Uses swift build/test commands directly
    #    - Cross-platform compatible (works on both macOS and Ubuntu)
    #    - Uses standard .build directory caching
    #    - Faster for packages without Apple platform dependencies
    #
    # This conditional logic allows the same action to handle both Swift Package Manager
    # builds and comprehensive Apple ecosystem testing seamlessly

    # Intelligent Caching Strategy 1: Xcode Derived Data (macOS + Apple Platform Builds)
    # Uses specialized irgaly/xcode-cache action optimized for Xcode derived data management.
    # This approach is significantly more efficient than generic actions/cache for Xcode builds
    # because it understands Xcode's derived data structure and selective caching needs.
    #
    # Cache Key Strategy:
    # - Primary: xcode-deriveddata-{OS}-{XcodeVersion}-{PackageHash}-{ResolvedHash}-{BuildOnly}-{CommitSHA}
    # - Fallback: xcode-deriveddata-{OS}-{XcodeVersion}-{PackageHash}-{ResolvedHash}-{BuildOnly}-
    #
    # Key Components Explained:
    # - runner.os: Ensures platform isolation (different derived data per OS)
    # - XCODE_NAME: Isolates builds between different Xcode versions (critical for compatibility)
    # - PackageHash: Unique identifier per Swift package (prevents cache collisions between packages)
    # - ResolvedHash: Either Package.resolved hash or 'no-resolved' (see detect-resolved step)
    # - BuildOnly: Separates build-only from test builds to prevent test binary contamination
    # - github.sha: Provides exact build reproducibility (fallback allows partial matches)
    #
    # Performance Benefits:
    # - ~70-85% build time reduction on cache hits
    # - Preserves incremental compilation benefits
    # - Handles module dependency graphs efficiently
    # - Reduces redundant downloading of precompiled Swift modules
    # - Prevents cache pollution between different packages
    - uses: irgaly/xcode-cache@v1
      if: steps.detect-os.outputs.os == 'macos' && inputs.type && steps.detect-resolved.outputs.use-resolved == 'true'
      with:
        key: xcode-deriveddata-${{ runner.os }}-${{ env.XCODE_NAME }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}-${{ github.sha }}
        restore-keys: |
          xcode-deriveddata-${{ runner.os }}-${{ env.XCODE_NAME }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}-
        deriveddata-directory: ${{ env.DERIVED_DATA_PATH }}
        swiftpm-package-resolved-file: |
          ${{ inputs.working-directory }}/Package.resolved

    # Xcode Derived Data Cache (Without Package.resolved)
    # Same as above but omits swiftpm-package-resolved-file parameter when Package.resolved
    # is not being used (either missing or skip-package-resolved=true)
    - uses: irgaly/xcode-cache@v1
      if: steps.detect-os.outputs.os == 'macos' && inputs.type && steps.detect-resolved.outputs.use-resolved == 'false'
      with:
        key: xcode-deriveddata-${{ runner.os }}-${{ env.XCODE_NAME }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}-${{ github.sha }}
        restore-keys: |
          xcode-deriveddata-${{ runner.os }}-${{ env.XCODE_NAME }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}-
        deriveddata-directory: ${{ env.DERIVED_DATA_PATH }}

    # Ubuntu specific steps
    - name: Get Swift and OS versions
      if: steps.detect-os.outputs.os == 'ubuntu'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        SWIFT_VERSION=$(swift --version | head -n 1 | cut -d ' ' -f 3)
        echo "SWIFT_VERSION=$SWIFT_VERSION" >> $GITHUB_ENV
        OS_VERSION=$(. /etc/os-release && echo $VERSION_CODENAME)
        echo "OS_VERSION=$OS_VERSION" >> $GITHUB_ENV

    # Windows specific steps
    - name: Get Swift version for Windows
      if: steps.detect-os.outputs.os == 'windows'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        SWIFT_VERSION=$(swift --version | head -n 1 | cut -d ' ' -f 3)
        echo "SWIFT_VERSION=$SWIFT_VERSION" >> $GITHUB_ENV
        # Get Windows version and build number for cache key using simple registry lookup
        # This provides better cache isolation based on Windows version and build
        # Examples: "Windows Server 2022" + "20348" -> "windows-server-2022-20348"
        WINDOWS_PRODUCT=$(powershell -Command "(Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion').ProductName -replace ' ', '-'" | tr '[:upper:]' '[:lower:]')
        WINDOWS_BUILD=$(powershell -Command "(Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion').CurrentBuild")
        WINDOWS_VERSION="${WINDOWS_PRODUCT}-${WINDOWS_BUILD}"
        echo "WINDOWS_VERSION=$WINDOWS_VERSION" >> $GITHUB_ENV

    # Intelligent Caching Overview:
    # This action implements four distinct caching strategies optimized for different build scenarios:
    #
    # Strategy 1: Xcode Derived Data Caching (macOS + Apple platforms)
    #   - Uses irgaly/xcode-cache for Xcode simulator builds
    #   - Caches derived data directory with build artifacts and module cache
    #   - Most efficient for iOS/watchOS/tvOS/visionOS/macOS testing
    #   - Achieves 70-85% build time reduction
    #
    # Strategy 2a: macOS SPM Caching (Cross-platform packages on macOS)
    #   - Uses actions/cache for .build directory
    #   - Simpler than derived data, focused on SPM artifacts
    #   - Optimal for packages without Apple platform dependencies
    #   - Achieves 60-75% build time reduction
    #
    # Strategy 2b: Ubuntu SPM Caching (Linux builds)
    #   - Uses actions/cache with comprehensive directory coverage
    #   - Includes .build, .swiftpm, and .cache directories
    #   - Handles Ubuntu-specific Swift toolchain artifacts
    #   - Achieves 65-80% build time reduction
    #
    # Strategy 2c: Windows SPM Caching (Windows builds)
    #   - Uses actions/cache with comprehensive directory coverage
    #   - Includes .build, .swiftpm, and .cache directories
    #   - Handles Windows-specific Swift toolchain artifacts
    #   - Achieves 65-80% build time reduction
    #
    # Cache Invalidation Triggers:
    # - Package.resolved changes (dependency updates)
    # - Swift/Xcode version changes (toolchain compatibility)
    # - OS version changes (ABI compatibility)
    # - Exact commit SHA ensures build reproducibility

    # Intelligent Caching Strategy 2: Swift Package Manager Builds
    # These caching steps use the standard actions/cache for SPM builds, which is optimal
    # for cross-platform Swift packages that don't require Apple platform simulators.

    # Intelligent Caching Strategy 2a: macOS SPM Cache (Cross-Platform Packages)
    # Used when building Swift packages on macOS without specific Apple platform targeting.
    # Focuses on .build directory which contains Swift Package Manager compilation artifacts.
    #
    # Cache Key Strategy:
    # - Pattern: spm-{OS}-{XcodeVersion}-{PackageHash}-{ResolvedHash}-{BuildOnly}
    # - Xcode version isolation ensures Swift toolchain compatibility
    # - PackageHash: Unique identifier per Swift package (prevents cache collisions between packages)
    # - ResolvedHash: Either Package.resolved hash or 'no-resolved' (see detect-resolved step)
    # - BuildOnly: Separates build-only from test builds to prevent test binary contamination
    # - Simpler than derived data caching since no platform-specific artifacts
    #
    # Performance: ~60-75% build time reduction for cross-platform packages
    - name: Cache swift package modules (macOS)
      if: steps.detect-os.outputs.os == 'macos' && !inputs.type
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/.build
        key: spm-${{ runner.os }}-${{ env.XCODE_NAME }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}

    # Intelligent Caching Strategy 2b: Ubuntu SPM Cache (Linux Builds)
    # Comprehensive caching for Ubuntu Swift builds covering all SPM directories.
    # Includes additional .swiftpm and .cache directories that Swift uses for metadata.
    #
    # Cache Key Strategy:
    # - Pattern: spm-{UbuntuVersion}-{SwiftVersion}-{PackageHash}-{ResolvedHash}-{BuildOnly}
    # - OS version isolation (focal/jammy/noble) ensures ABI compatibility
    # - Swift version isolation prevents toolchain conflicts
    # - PackageHash: Unique identifier per Swift package (prevents cache collisions between packages)
    # - ResolvedHash: Either Package.resolved hash or 'no-resolved' (see detect-resolved step)
    # - BuildOnly: Separates build-only from test builds to prevent test binary contamination
    # - No Xcode version since Ubuntu uses system Swift toolchain
    #
    # Cached Directories Explained:
    # - .build: Compiled Swift modules and intermediate build artifacts
    # - .swiftpm: Swift Package Manager metadata and configuration cache
    # - .cache: Local cache directory used by swift build --cache-path flag
    #
    # Performance: ~65-80% build time reduction, especially effective for large dependency trees
    - name: Cache swift package modules (Ubuntu)
      if: steps.detect-os.outputs.os == 'ubuntu'
      uses: actions/cache@v4
      with:
        path: |
          ${{ inputs.working-directory }}/.build
          ${{ inputs.working-directory }}/.swiftpm
          ${{ inputs.working-directory }}/.cache
        key: spm-${{ env.OS_VERSION }}-${{ env.SWIFT_VERSION }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}

    # Intelligent Caching Strategy 2c: Windows SPM Cache (Windows Builds)
    # Comprehensive caching for Windows Swift builds covering all SPM directories.
    # Similar to Ubuntu but with Windows-specific Swift toolchain considerations.
    #
    # Cache Key Strategy:
    # - Pattern: spm-windows-{WindowsProductNameSlug}-{BuildNumber}-{SwiftVersion}-{PackageHash}-{ResolvedHash}-{BuildOnly}
    # - Windows version and build isolation ensures toolchain compatibility
    # - Swift version isolation prevents conflicts between different Windows Swift builds
    # - PackageHash: Unique identifier per Swift package (prevents cache collisions between packages)
    # - ResolvedHash: Either Package.resolved hash or 'no-resolved' (see detect-resolved step)
    # - BuildOnly: Separates build-only from test builds to prevent test binary contamination
    # - Uses Swift version from installed Windows toolchain
    # - Uses slugified Windows product name + build number (e.g., "windows-server-2022-20348") for proper cache isolation
    #
    # Cached Directories Explained:
    # - .build: Compiled Swift modules and intermediate build artifacts
    # - .swiftpm: Swift Package Manager metadata and configuration cache
    # - .cache: Local cache directory used by swift build --cache-path flag
    #
    # Performance: ~65-80% build time reduction for Windows Swift builds
    - name: Cache swift package modules (Windows)
      if: steps.detect-os.outputs.os == 'windows'
      uses: actions/cache@v4
      with:
        path: |
          ${{ inputs.working-directory }}/.build
          ${{ inputs.working-directory }}/.swiftpm
          ${{ inputs.working-directory }}/.cache
        key: spm-${{ env.WINDOWS_VERSION }}-${{ env.SWIFT_VERSION }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}

    # Intelligent Caching Strategy 2d: Wasm Build Cache (WebAssembly Builds)
    # Comprehensive caching for Wasm builds covering SPM directories and installed SDKs.
    #
    # Cache Key Strategy:
    # - Pattern: wasm-{OS}-{SwiftVersion}-{WasmVariant}-{PackageHash}-{ResolvedHash}-{BuildOnly}
    # - OS: Runner OS (macOS or Linux) for platform-specific cache isolation
    # - SwiftVersion: Detected Swift version (e.g., "6.2.3") ensures toolchain compatibility
    # - WasmVariant: Either 'wasm' or 'wasm-embedded' for variant-specific caching
    # - PackageHash: Unique identifier per Swift package (prevents cache collisions between packages)
    # - ResolvedHash: Either Package.resolved hash or 'no-resolved' (see detect-resolved step)
    # - BuildOnly: Separates build-only from test builds to prevent test binary contamination
    #
    # Cached Directories Explained:
    # - .build: Compiled Wasm modules and intermediate build artifacts
    # - .swiftpm: Swift Package Manager metadata and configuration cache
    # - .cache: Local cache directory used by swift build --cache-path flag
    # - ~/.swiftpm/swift-sdks: Installed Wasm SDK (avoids re-downloading on subsequent runs)
    #
    # Performance:
    # - First run: ~5-10 minutes (includes SDK download and installation)
    # - Subsequent runs: ~30 seconds (SDK restored from cache)
    # - Build time: Similar to SPM builds, significantly faster with cache
    - name: Cache Wasm Build
      if: steps.detect-os.outputs.os == 'wasm'
      uses: actions/cache@v4
      with:
        path: |
          ${{ inputs.working-directory }}/.build
          ${{ inputs.working-directory }}/.swiftpm
          ${{ inputs.working-directory }}/.cache
          ~/.swiftpm/swift-sdks
        key: wasm-${{ runner.os }}-${{ steps.detect-swift-version.outputs.swift-version }}-${{ steps.detect-os.outputs.wasm-variant }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-${{ inputs.build-only }}
        restore-keys: |
          wasm-${{ runner.os }}-${{ steps.detect-swift-version.outputs.swift-version }}-${{ steps.detect-os.outputs.wasm-variant }}-${{ steps.package-hash.outputs.package-hash }}-${{ steps.detect-resolved.outputs.resolved-hash }}-
          wasm-${{ runner.os }}-${{ steps.detect-swift-version.outputs.swift-version }}-${{ steps.detect-os.outputs.wasm-variant }}-${{ steps.package-hash.outputs.package-hash }}-
          wasm-${{ runner.os }}-${{ steps.detect-swift-version.outputs.swift-version }}-${{ steps.detect-os.outputs.wasm-variant }}-

    # Build and Test Execution: Two-Path Strategy
    # The action implements a dual-path build strategy to handle both cross-platform Swift packages
    # and Apple platform-specific testing requirements. This approach maximizes compatibility while
    # providing optimized performance for each build scenario.
    #
    # Path Selection Logic:
    # 1. SPM Build Path: Used when 'type' parameter is omitted
    #    - Cross-platform compatible (Ubuntu + macOS)
    #    - Uses swift build/test commands directly
    #    - Faster for packages without Apple platform dependencies
    #    - Optimal for open-source Swift packages
    #
    # 2. Xcode Build Path: Used when 'type' parameter is specified
    #    - macOS-only (requires Xcode toolchain)
    #    - Uses xcodebuild for platform-specific testing
    #    - Required for iOS/watchOS/tvOS/visionOS simulator testing
    #    - Enables comprehensive Apple ecosystem validation

    # SPM Build and Test Execution (Cross-Platform Swift Packages)
    # This step handles standard Swift Package Manager builds for packages that work across
    # multiple platforms without requiring Apple platform simulators or specific Xcode versions.
    #
    # Command Breakdown:
    # - swift build --build-tests: Compiles both the package and its test targets (when not build-only)
    # - swift build: Compiles only the package (when build-only is enabled)
    # - swift test --enable-code-coverage: Runs tests with coverage collection (when not build-only)
    # - --cache-path .cache: Uses local cache directory for build artifacts (improves performance)
    # - --force-resolved-versions: Enforces strict dependency pinning (omitted only when skip-package-resolved=true)
    #
    # Dependency Resolution:
    # - When skip-package-resolved='false': Always uses --force-resolved-versions (strict mode)
    # - When skip-package-resolved='true': Omits flag to allow floating dependency versions
    #
    # Platform Compatibility:
    # - Ubuntu: Uses system Swift toolchain (5.9-6.2 depending on runner)
    # - macOS: Uses Xcode-bundled Swift when no specific Apple platform is targeted
    # - Windows: Uses installed Swift toolchain
    #
    # Performance Optimizations:
    # - Build artifacts cached via .build directory (60-80% time reduction)
    # - Force-resolved-versions prevents dependency resolution inconsistencies
    # - Cache-path flag enables local build artifact reuse
    - name: Build${{ inputs.build-only == 'true' && '' || ' and Test' }}
      if: (steps.detect-os.outputs.os == 'macos' && !inputs.type) || steps.detect-os.outputs.os == 'ubuntu' || steps.detect-os.outputs.os == 'windows'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Build resolved versions flag conditionally
        # Only skip the flag when user explicitly requested skip-package-resolved=true
        if [[ "${{ inputs.skip-package-resolved }}" == "true" ]]; then
          RESOLVED_FLAG=""
        else
          RESOLVED_FLAG="--force-resolved-versions"
        fi

        # Configure output saving if enabled
        if [[ "${{ inputs.save-test-output }}" == "true" ]]; then
          OUTPUT_FILE="${{ inputs.working-directory }}/test-output.txt"
        fi

        if [ "${{ inputs.build-only }}" = "true" ]; then
          swift build --cache-path .cache $RESOLVED_FLAG
        else
          swift build --build-tests --cache-path .cache $RESOLVED_FLAG
          # Run tests with optional output capture
          if [[ "${{ inputs.save-test-output }}" == "true" ]]; then
            set -o pipefail
            swift test --enable-code-coverage --cache-path .cache $RESOLVED_FLAG 2>&1 | tee "$OUTPUT_FILE"
          else
            swift test --enable-code-coverage --cache-path .cache $RESOLVED_FLAG
          fi
        fi

    # Wasm Build and Test Execution (WebAssembly Builds)
    # This step handles Wasm-based builds for Swift packages targeting WebAssembly.
    # Uses Swift Package Manager with the --swift-sdk flag to specify Wasm or Wasm-embedded target.
    #
    # Build Strategy:
    # - Uses the Wasm SDK installed in the earlier step
    # - Tests run via WasmKit runtime (bundled with Swift 6.2.3+ toolchains, default)
    # - Wasmtime runtime available as optional fallback via wasmtime-version parameter
    # - Build-only mode skips test execution
    #
    # Command Parameters Explained:
    # - --swift-sdk: Specifies the Wasm SDK to use (e.g., swift-6.2.3-RELEASE_wasm)
    # - --cache-path: Uses local cache directory for build artifacts
    # - --force-resolved-versions: Enforces strict dependency pinning (omitted when skip-package-resolved=true)
    # - --build-tests: Compiles test targets (only in test mode)
    #
    # Performance Benefits:
    # - SDK caching provides fast subsequent builds (~30 seconds vs ~5-10 minutes first run)
    # - Build artifact caching reduces compilation time significantly
    # - WasmKit runtime enables instant test execution (bundled, no downloads)
    # - Wasmtime fallback available for older Swift versions (<6.2.3)

    # Validate Wasmtime version format
    # Only specific version numbers (X.Y.Z format) are supported
    # 'latest' is no longer supported to simplify implementation and improve reproducibility
    - name: Validate Wasmtime Version
      if: steps.detect-os.outputs.os == 'wasm' && inputs.build-only != 'true' && inputs.wasmtime-version != ''
      shell: bash
      id: validate-wasmtime-version
      run: |
        WasmTIME_VERSION="${{ inputs.wasmtime-version }}"

        # Check if user is trying to use 'latest'
        if [[ "$WasmTIME_VERSION" == "latest" ]]; then
          echo ""
          echo "ERROR: wasmtime-version 'latest' is no longer supported"
          echo ""
          echo "Breaking Change (v2.0): The 'latest' option has been removed to:"
          echo "  - Simplify implementation (no GitHub API calls needed)"
          echo "  - Improve reproducibility (explicit version pinning)"
          echo "  - Eliminate rate limiting concerns"
          echo ""
          echo "Action Required: Please specify an exact version number"
          echo "Example: wasmtime-version: '27.0.0'"
          echo ""
          echo "To find available versions, visit:"
          echo "https://github.com/bytecodealliance/wasmtime/releases"
          echo ""
          echo "Alternatively, omit wasmtime-version to use WasmKit runtime (bundled with Swift 6.2.3+)"
          exit 1
        fi

        # Validate version format (should be X.Y.Z)
        if [[ ! "$WasmTIME_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo ""
          echo "ERROR: Invalid Wasmtime version format: $WasmTIME_VERSION"
          echo "Expected format: X.Y.Z (e.g., '27.0.0', '26.0.0')"
          echo ""
          echo "To find available versions, visit:"
          echo "https://github.com/bytecodealliance/wasmtime/releases"
          exit 1
        fi

        echo "Using Wasmtime version: $WasmTIME_VERSION"
        echo "wasmtime-version=$WasmTIME_VERSION" >> $GITHUB_OUTPUT

    # Cache Wasmtime binary to avoid ~500MB download per run (only when using Wasmtime fallback)
    # Key includes validated version, OS, and architecture for platform-specific binaries
    # First run: downloads binary (~3-5 min), subsequent runs use cache (<5 sec)
    - name: Cache Wasmtime Binary
      if: steps.detect-os.outputs.os == 'wasm' && inputs.build-only != 'true' && inputs.wasmtime-version != ''
      uses: actions/cache@v4
      id: wasmtime-cache
      with:
        path: ${{ runner.temp }}/wasmtime
        key: wasmtime-${{ steps.validate-wasmtime-version.outputs.wasmtime-version }}-${{ runner.os }}-${{ runner.arch }}
        restore-keys: |
          wasmtime-${{ steps.validate-wasmtime-version.outputs.wasmtime-version }}-${{ runner.os }}-

    # Detect Wasm testing framework (Swift Testing vs XCTest)
    # Automatically scans test sources for 'import Testing' vs 'import XCTest' statements
    # Outputs: mode = 'swift-testing', 'xctest', 'both', or 'none'
    # Can be overridden via wasm-testing-library input parameter
    - name: Detect Wasm Testing Framework
      if: steps.detect-os.outputs.os == 'wasm' && inputs.build-only != 'true'
      shell: bash
      id: detect-wasm-testing
      working-directory: ${{ inputs.working-directory }}
      run: |
        MODE="${{ inputs.wasm-testing-library }}"

        if [[ "$MODE" == "auto" ]]; then
          echo "Auto-detecting testing framework from source files..."

          # Check if Tests/ directory exists
          if [[ ! -d "Tests/" ]]; then
            echo "Warning: Tests/ directory not found, defaulting to 'none' mode"
            echo "mode=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for Swift Testing imports
          if grep -r "import Testing" Tests/ --include="*.swift" >/dev/null 2>&1; then
            HAS_SWIFT_TESTING=true
            echo "  ✓ Found Swift Testing imports"
          else
            HAS_SWIFT_TESTING=false
          fi

          # Check for XCTest imports
          if grep -r "import XCTest" Tests/ --include="*.swift" >/dev/null 2>&1; then
            HAS_XCTEST=true
            echo "  ✓ Found XCTest imports"
          else
            HAS_XCTEST=false
          fi

          # Determine mode based on what was found
          if [[ "$HAS_SWIFT_TESTING" == "true" ]] && [[ "$HAS_XCTEST" == "true" ]]; then
            DETECTED_MODE="both"
            echo "Detected: Both Swift Testing and XCTest (will run tests twice)"
          elif [[ "$HAS_SWIFT_TESTING" == "true" ]]; then
            DETECTED_MODE="swift-testing"
            echo "Detected: Swift Testing only"
          elif [[ "$HAS_XCTEST" == "true" ]]; then
            DETECTED_MODE="xctest"
            echo "Detected: XCTest only"
          else
            DETECTED_MODE="none"
            echo "Warning: No testing framework imports found, running without testing library flags"
          fi

          echo "mode=$DETECTED_MODE" >> $GITHUB_OUTPUT
        else
          echo "Using explicit mode: $MODE"
          echo "mode=$MODE" >> $GITHUB_OUTPUT
        fi

    - name: Build${{ inputs.build-only == 'true' && '' || ' and Test' }} (Wasm)
      if: steps.detect-os.outputs.os == 'wasm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        SDK_FLAG="--swift-sdk ${{ steps.detect-swift-version.outputs.wasm-sdk }}"
        RESOLVED_FLAG=""

        if [[ "${{ steps.detect-resolved.outputs.use-resolved }}" == "true" ]]; then
          RESOLVED_FLAG="--force-resolved-versions"
        fi

        if [[ "${{ inputs.build-only }}" == "true" ]]; then
          echo "Building Wasm package (build-only mode)..."
          swift build $SDK_FLAG --cache-path .cache $RESOLVED_FLAG ${{ inputs.wasm-swift-flags }}
        else
          echo "Building and testing Wasm package..."

          # Runtime selection based on wasmtime-version parameter
          if [[ -n "${{ inputs.wasmtime-version }}" ]]; then
            # WasmTIME FALLBACK (when wasmtime-version is explicitly specified)
            echo "Using Wasmtime runtime fallback (version: ${{ inputs.wasmtime-version }})"
            echo ""
            echo "Note: WasmKit is now the default runtime (bundled with Swift 6.2.3+)"
            echo "You can remove wasmtime-version parameter to use WasmKit for faster execution"
            echo ""

            # Determine platform for Wasmtime binary download
            echo "Detecting platform for Wasmtime binary..."
            echo "Environment diagnostics:"
            echo "  Runner OS: ${{ runner.os }}"
            echo "  Runner arch: ${{ runner.arch }}"
            echo "  OSTYPE: ${OSTYPE:-<unset>}"

            # Method 1: Use $OSTYPE if available (bash built-in, fastest)
            if [[ -n "$OSTYPE" ]]; then
              if [[ "$OSTYPE" == "linux-gnu"* ]] || [[ "$OSTYPE" == "linux"* ]]; then
                WasmTIME_PLATFORM="x86_64-linux"
              elif [[ "$OSTYPE" == "darwin"* ]]; then
                WasmTIME_PLATFORM="x86_64-macos"
              fi
            fi

            # Method 2: Fallback to uname if OSTYPE didn't match or wasn't set
            if [[ -z "$WasmTIME_PLATFORM" ]]; then
              UNAME_OS=$(uname -s)
              case "$UNAME_OS" in
                Linux*)
                  WasmTIME_PLATFORM="x86_64-linux"
                  ;;
                Darwin*)
                  WasmTIME_PLATFORM="x86_64-macos"
                  ;;
                *)
                  echo ""
                  echo "ERROR: Unsupported platform for Wasmtime"
                  echo "Platform detection failed with:"
                  echo "  OSTYPE: ${OSTYPE:-<unset>}"
                  echo "  uname -s: $UNAME_OS"
                  echo ""
                  echo "Supported platforms:"
                  echo "  - Linux (x86_64)"
                  echo "  - macOS (x86_64)"
                  echo ""
                  echo "Consider using WasmKit instead (supports more platforms)"
                  exit 1
                  ;;
              esac
            fi

            echo "Selected Wasmtime platform: $WasmTIME_PLATFORM"
            echo ""

            # Use validated version from earlier step
            WasmTIME_VERSION="${{ steps.validate-wasmtime-version.outputs.wasmtime-version }}"

            WasmTIME_CACHE_DIR="${{ runner.temp }}/wasmtime"
            WasmTIME_BIN="$WasmTIME_CACHE_DIR/wasmtime-v${WasmTIME_VERSION}-${WasmTIME_PLATFORM}/wasmtime"

            echo "Wasmtime configuration:"
            echo "  Version: $WasmTIME_VERSION"
            echo "  Platform: $WasmTIME_PLATFORM"
            echo "  Binary path: $WasmTIME_BIN"
            echo ""

            # Download Wasmtime if not cached
            if [[ ! -f "$WasmTIME_BIN" ]]; then
              echo "Downloading Wasmtime v${WasmTIME_VERSION} for ${WasmTIME_PLATFORM}..."
              WasmTIME_URL="https://github.com/bytecodealliance/wasmtime/releases/download/v${WasmTIME_VERSION}/wasmtime-v${WasmTIME_VERSION}-${WasmTIME_PLATFORM}.tar.xz"
              echo "Download URL: $WasmTIME_URL"

              mkdir -p "$WasmTIME_CACHE_DIR"
              curl -L "$WasmTIME_URL" -o "$WasmTIME_CACHE_DIR/wasmtime.tar.xz"
              tar -xf "$WasmTIME_CACHE_DIR/wasmtime.tar.xz" -C "$WasmTIME_CACHE_DIR"
              rm "$WasmTIME_CACHE_DIR/wasmtime.tar.xz"
            else
              echo "Using cached Wasmtime v${WasmTIME_VERSION}"
            fi

            # Verify installation
            if [[ ! -f "$WasmTIME_BIN" ]]; then
              echo ""
              echo "ERROR: Failed to find wasmtime binary at expected path"
              echo "Expected: $WasmTIME_BIN"
              echo "Cache directory contents:"
              ls -la "$WasmTIME_CACHE_DIR" 2>/dev/null || echo "  <directory not found>"
              exit 1
            fi

            echo "Wasmtime successfully installed at: $WasmTIME_BIN"
            echo ""

            # Build tests
            echo "Building Wasm tests..."
            swift build --build-tests $SDK_FLAG --cache-path .cache $RESOLVED_FLAG ${{ inputs.wasm-swift-flags }}

            # Find and run test binaries
            echo "Searching for Wasm test binaries..."
            TEST_BINARIES=$(find .build -type f \( -name "*Tests.wasm" -o -name "*PackageTests.wasm" \) 2>/dev/null)

            if [[ -z "$TEST_BINARIES" ]]; then
              echo "No .wasm test binaries found, searching for .xctest..."
              TEST_BINARIES=$(find .build -type f \( -name "*Tests.xctest" -o -name "*PackageTests.xctest" \) 2>/dev/null)
            fi

            if [[ -z "$TEST_BINARIES" ]]; then
              echo "ERROR: No Wasm test binaries found"
              echo "Contents of .build/:"
              find .build -type f 2>/dev/null || echo "No files found"
              exit 1
            fi

            echo "Found test binaries:"
            echo "$TEST_BINARIES"
            echo ""

            # Configure output saving if enabled
            if [[ "${{ inputs.save-test-output }}" == "true" ]]; then
              XCTEST_OUTPUT="${{ inputs.working-directory }}/wasm-xctest-output.txt"
              SWIFT_TESTING_OUTPUT="${{ inputs.working-directory }}/wasm-swift-testing-output.txt"
            fi

            # Determine test execution strategy from detection step
            TEST_MODE="${{ steps.detect-wasm-testing.outputs.mode }}"
            EXTRA_FLAGS="${{ inputs.wasm-swift-test-flags }}"

            while IFS= read -r TEST_BINARY; do
              echo "Running tests: $TEST_BINARY (mode: $TEST_MODE)"

              case "$TEST_MODE" in
                swift-testing)
                  # Swift Testing only
                  echo "  Using Swift Testing framework"
                  if [[ -n "$SWIFT_TESTING_OUTPUT" ]]; then
                    set -o pipefail
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS 2>&1 | tee "$SWIFT_TESTING_OUTPUT"
                  else
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS
                  fi
                  ;;

                xctest)
                  # XCTest only (no --testing-library flag)
                  echo "  Using XCTest framework"
                  if [[ -n "$XCTEST_OUTPUT" ]]; then
                    set -o pipefail
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" $EXTRA_FLAGS 2>&1 | tee "$XCTEST_OUTPUT"
                  else
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" $EXTRA_FLAGS
                  fi
                  ;;

                both)
                  # Run twice - once for each framework (fail if either fails)
                  echo "  Running with Swift Testing framework..."
                  SWIFT_TESTING_EXIT=0
                  if [[ -n "$SWIFT_TESTING_OUTPUT" ]]; then
                    set -o pipefail
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS 2>&1 | tee "$SWIFT_TESTING_OUTPUT" || SWIFT_TESTING_EXIT=$?
                  else
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS || SWIFT_TESTING_EXIT=$?
                  fi

                  echo "  Running with XCTest framework..."
                  XCTEST_EXIT=0
                  if [[ -n "$XCTEST_OUTPUT" ]]; then
                    set -o pipefail
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" $EXTRA_FLAGS 2>&1 | tee "$XCTEST_OUTPUT" || XCTEST_EXIT=$?
                  else
                    "$WasmTIME_BIN" --dir . "$TEST_BINARY" $EXTRA_FLAGS || XCTEST_EXIT=$?
                  fi

                  # Fail if either framework failed
                  if [[ $SWIFT_TESTING_EXIT -ne 0 ]] || [[ $XCTEST_EXIT -ne 0 ]]; then
                    echo "ERROR: Tests failed (Swift Testing exit: $SWIFT_TESTING_EXIT, XCTest exit: $XCTEST_EXIT)"
                    exit 1
                  fi
                  ;;

                none)
                  # No testing library flags (for custom test harnesses)
                  echo "  Running without testing library flags"
                  "$WasmTIME_BIN" --dir . "$TEST_BINARY" $EXTRA_FLAGS
                  ;;

                *)
                  echo "ERROR: Invalid testing mode: $TEST_MODE"
                  exit 1
                  ;;
              esac
            done <<< "$TEST_BINARIES"

          else
            # WasmKIT DEFAULT (new default when no wasmtime-version specified)
            echo "Using WasmKit runtime (bundled with Swift toolchain)"
            echo ""

            # Build tests
            echo "Building Wasm tests..."
            # Note: Code coverage is NOT supported for Wasm targets
            # The Swift toolchain does not provide libclang_rt.profile-wasm32.a
            # Use the 'contains-code-coverage' output to conditionally skip coverage actions
            swift build --build-tests $SDK_FLAG --cache-path .cache $RESOLVED_FLAG ${{ inputs.wasm-swift-flags }}

            # Verify WasmKit availability
            if ! command -v wasmkit >/dev/null 2>&1; then
              echo ""
              echo "ERROR: wasmkit runtime not found in Swift toolchain"
              echo "WasmKit requires Swift 6.2.3+ toolchain"
              echo ""
              echo "Current Swift version:"
              swift --version
              echo ""
              echo "Workaround options:"
              echo "  1. Upgrade to Swift 6.2.3 or later"
              echo "  2. Use Wasmtime fallback by specifying wasmtime-version parameter"
              echo "     Example: wasmtime-version: '27.0.0'"
              echo ""
              echo "To find available Wasmtime versions:"
              echo "https://github.com/bytecodealliance/wasmtime/releases"
              exit 1
            fi

            echo "WasmKit binary: $(which wasmkit)"
            wasmkit --version
            echo ""

            # Find all Wasm test binaries dynamically (supports any test target name)
            echo "Searching for Wasm test binaries..."
            TEST_BINARIES=$(find .build -type f \( -name "*Tests.wasm" -o -name "*PackageTests.wasm" \) 2>/dev/null)

            # Fallback to .xctest if no .wasm found
            if [[ -z "$TEST_BINARIES" ]]; then
              echo "No .wasm test binaries found, searching for .xctest..."
              TEST_BINARIES=$(find .build -type f \( -name "*Tests.xctest" -o -name "*PackageTests.xctest" \) 2>/dev/null)
            fi

            # Error if no test binaries found
            if [[ -z "$TEST_BINARIES" ]]; then
              echo "ERROR: No Wasm test binaries found"
              echo "Contents of .build/:"
              find .build -type f 2>/dev/null || echo "No files found"
              exit 1
            fi

            # Run each test binary (supports multi-target packages)
            echo "Found test binaries:"
            echo "$TEST_BINARIES"
            echo ""

            # Configure output saving if enabled
            if [[ "${{ inputs.save-test-output }}" == "true" ]]; then
              XCTEST_OUTPUT="${{ inputs.working-directory }}/wasm-xctest-output.txt"
              SWIFT_TESTING_OUTPUT="${{ inputs.working-directory }}/wasm-swift-testing-output.txt"
            fi

            # Determine test execution strategy from detection step
            TEST_MODE="${{ steps.detect-wasm-testing.outputs.mode }}"
            EXTRA_FLAGS="${{ inputs.wasm-swift-test-flags }}"

            while IFS= read -r TEST_BINARY; do
              echo "Running tests: $TEST_BINARY (mode: $TEST_MODE)"

              case "$TEST_MODE" in
                swift-testing)
                  # Swift Testing only
                  echo "  Using Swift Testing framework"
                  if [[ -n "$SWIFT_TESTING_OUTPUT" ]]; then
                    set -o pipefail
                    wasmkit run --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS 2>&1 | tee "$SWIFT_TESTING_OUTPUT"
                  else
                    wasmkit run --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS
                  fi
                  ;;

                xctest)
                  # XCTest only (no --testing-library flag)
                  echo "  Using XCTest framework"
                  if [[ -n "$XCTEST_OUTPUT" ]]; then
                    set -o pipefail
                    wasmkit run --dir . "$TEST_BINARY" $EXTRA_FLAGS 2>&1 | tee "$XCTEST_OUTPUT"
                  else
                    wasmkit run --dir . "$TEST_BINARY" $EXTRA_FLAGS
                  fi
                  ;;

                both)
                  # Run twice - once for each framework (fail if either fails)
                  echo "  Running with Swift Testing framework..."
                  SWIFT_TESTING_EXIT=0
                  if [[ -n "$SWIFT_TESTING_OUTPUT" ]]; then
                    set -o pipefail
                    wasmkit run --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS 2>&1 | tee "$SWIFT_TESTING_OUTPUT" || SWIFT_TESTING_EXIT=$?
                  else
                    wasmkit run --dir . "$TEST_BINARY" --testing-library swift-testing $EXTRA_FLAGS || SWIFT_TESTING_EXIT=$?
                  fi

                  echo "  Running with XCTest framework..."
                  XCTEST_EXIT=0
                  if [[ -n "$XCTEST_OUTPUT" ]]; then
                    set -o pipefail
                    wasmkit run --dir . "$TEST_BINARY" $EXTRA_FLAGS 2>&1 | tee "$XCTEST_OUTPUT" || XCTEST_EXIT=$?
                  else
                    wasmkit run --dir . "$TEST_BINARY" $EXTRA_FLAGS || XCTEST_EXIT=$?
                  fi

                  # Fail if either framework failed
                  if [[ $SWIFT_TESTING_EXIT -ne 0 ]] || [[ $XCTEST_EXIT -ne 0 ]]; then
                    echo "ERROR: Tests failed (Swift Testing exit: $SWIFT_TESTING_EXIT, XCTest exit: $XCTEST_EXIT)"
                    exit 1
                  fi
                  ;;

                none)
                  # No testing library flags (for custom test harnesses)
                  echo "  Running without testing library flags"
                  wasmkit run --dir . "$TEST_BINARY" $EXTRA_FLAGS
                  ;;

                *)
                  echo "ERROR: Invalid testing mode: $TEST_MODE"
                  exit 1
                  ;;
              esac
            done <<< "$TEST_BINARIES"
          fi
        fi

    # Xcode Build and Test Execution (Apple Platform Testing)
    # This step handles Xcode-based builds for testing Swift packages on Apple platforms
    # (iOS, watchOS, tvOS, visionOS, macOS) using simulators or native macOS execution.
    #
    # Build Strategy Decision:
    # - macOS builds: Use native platform testing (no simulator required)
    # - iOS/watchOS/tvOS/visionOS: Use simulator-based testing with specific device/OS combinations
    # - Build-only mode: Use 'xcodebuild build' instead of 'xcodebuild test'
    #
    # Command Parameters Explained:
    # - -scheme: Specifies which build scheme to use (must match Package.swift or .xcodeproj)
    # - -sdk: Platform SDK (iphonesimulator, watchsimulator, appletvsimulator, xrsimulator, macosx)
    # - -destination: Target platform and device configuration for testing/building
    # - -enableCodeCoverage: Collects code coverage metrics during test execution (only for tests)
    # - -derivedDataPath: Uses optimized derived data location for caching performance
    #
    # Destination String Construction:
    # - macOS: 'platform=macOS' (native execution, no simulator)
    # - Other platforms: 'platform={PLATFORM},name={deviceName},OS={osVersion}'
    #   Examples: 'platform=iOS Simulator,name=iPhone 15,OS=17.0'
    #             'platform=watchOS Simulator,name=Apple Watch Series 9 (45mm),OS=10.0'
    #
    # Performance Benefits:
    # - Derived data caching provides 70-85% build time reduction
    # - Platform-specific optimizations leverage Xcode's incremental compilation
    # - Simulator reuse reduces platform initialization overhead
    - name: Build${{ inputs.build-only == 'true' && '' || ' and Test' }} (Apple Platforms)
      if: steps.detect-os.outputs.os == 'macos' && inputs.type
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Fix for iOS simulator connection issue (https://github.com/actions/runner-images/issues/12862)
        # Establish simulator connection before running xcodebuild
        xcrun simctl list > /dev/null

        # Build destination string based on platform type
        if [ "${{ inputs.type }}" = "macos" ]; then
          DESTINATION="platform=macOS"
        else
          DESTINATION="platform=${{ env.PLATFORM }},name=${{ inputs.deviceName }},OS=${{ inputs.osVersion }}"
        fi

        # Build xcodebuild command based on build-only mode
        if [ "${{ inputs.build-only }}" = "true" ]; then
          # Build-only mode: compile without running tests
          XCODEBUILD_CMD="xcodebuild build \
            -scheme ${{ inputs.scheme }} \
            -sdk ${{ env.SDK }} \
            -destination \"$DESTINATION\" \
            -derivedDataPath ${{ env.DERIVED_DATA_PATH }}"
        else
          # Normal mode: build and run tests with coverage
          XCODEBUILD_CMD="xcodebuild test \
            -scheme ${{ inputs.scheme }} \
            -sdk ${{ env.SDK }} \
            -destination \"$DESTINATION\" \
            -enableCodeCoverage YES \
            -derivedDataPath ${{ env.DERIVED_DATA_PATH }}"
        fi

        # Configure output saving if enabled
        if [[ "${{ inputs.save-test-output }}" == "true" && "${{ inputs.build-only }}" != "true" ]]; then
          OUTPUT_FILE="${{ inputs.working-directory }}/test-output.txt"
        fi

        # Execute with or without xcbeautify
        if [ "${{ inputs.use-xcbeautify }}" = "true" ]; then
          # Set up unbuffered I/O for better xcbeautify output
          export NSUnbufferedIO=YES

          # Build xcbeautify command
          if [ -n "${{ inputs.xcbeautify-renderer }}" ] && [ "${{ inputs.xcbeautify-renderer }}" != "default" ]; then
            XCBEAUTIFY_CMD="xcbeautify --renderer ${{ inputs.xcbeautify-renderer }}"
          else
            XCBEAUTIFY_CMD="xcbeautify"
          fi

          # Execute with xcbeautify and proper pipe failure handling
          # Use set -o pipefail to ensure xcodebuild failures are not masked by xcbeautify success
          set -o pipefail
          if [[ -n "$OUTPUT_FILE" ]]; then
            # Save output and pipe through xcbeautify
            eval "$XCODEBUILD_CMD 2>&1 | tee \"$OUTPUT_FILE\" | $XCBEAUTIFY_CMD"
          else
            # Just pipe through xcbeautify
            eval "$XCODEBUILD_CMD 2>&1 | $XCBEAUTIFY_CMD"
          fi
          # Capture exit code to ensure build failures are properly reported
          BUILD_EXIT_CODE=$?
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "Build failed with exit code: $BUILD_EXIT_CODE" >&2
            exit $BUILD_EXIT_CODE
          fi
        else
          # Execute without xcbeautify
          if [[ -n "$OUTPUT_FILE" ]]; then
            set -o pipefail
            eval "$XCODEBUILD_CMD 2>&1 | tee \"$OUTPUT_FILE\""
          else
            eval "$XCODEBUILD_CMD"
          fi
        fi

    # Restore Package.resolved after build/test completion
    # This step restores the Package.resolved file that was backed up and deleted
    # in the "Remove Package.resolved (skip mode)" step earlier in the workflow.
    #
    # Why this is necessary:
    # - Maintains consistency with the repository state
    # - Prevents confusion for multi-step workflows that might reference the file
    # - Ensures artifacts or caches capture the original repository structure
    # - Avoids accidental commits of missing Package.resolved in auto-commit workflows
    #
    # The restoration happens after all build and test operations are complete,
    # so it doesn't interfere with the floating dependency resolution during builds.
    - name: Restore Package.resolved (skip mode)
      if: inputs.skip-package-resolved == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [[ -f "$RUNNER_TEMP/Package.resolved.backup" ]]; then
          echo "Restoring Package.resolved from backup"
          cp "$RUNNER_TEMP/Package.resolved.backup" Package.resolved
        else
          echo "No Package.resolved backup found, nothing to restore"
        fi
