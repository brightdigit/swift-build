name: Swift Package Tests

on:
  push

jobs:
  # Simplified workflow focusing on WASM code coverage implementation
  # All other jobs (macOS, Ubuntu, Windows, Android) are temporarily disabled

  test-single-target-wasm:
    name: Test Single Target Package (WASM with Code Coverage)
    runs-on: ubuntu-latest
    container: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test WASM with Coverage
        uses: ./
        with:
          working-directory: test/SingleTargetPackage
          scheme: SingleTargetPackage
          type: wasm
          skip-package-resolved: "true"
          wasm-swift-flags: >-
            -Xcc -D_WASI_EMULATED_SIGNAL
            -Xcc -D_WASI_EMULATED_MMAN
            -Xlinker -lwasi-emulated-signal
            -Xlinker -lwasi-emulated-mman
            -Xlinker -lwasi-emulated-getpid
            -Xlinker --initial-memory=536870912
            -Xlinker --max-memory=536870912

      - name: Collect WASM coverage
        if: always()
        working-directory: test/SingleTargetPackage
        shell: bash
        run: |
          echo "Collecting code coverage data..."

          # Check if profraw file exists
          if [[ ! -f "default.profraw" ]]; then
            echo "ERROR: No default.profraw file found. Coverage data not collected."
            exit 1
          fi

          echo "Found default.profraw ($(du -h default.profraw | cut -f1))"

          # Merge profraw files
          llvm-profdata merge default.profraw -o default.profdata
          echo "Created default.profdata ($(du -h default.profdata | cut -f1))"

          # Find test binary
          TEST_BINARY=$(find .build -type f -name "*Tests.wasm" | head -n 1)

          if [[ -z "$TEST_BINARY" ]]; then
            echo "ERROR: Could not find test binary"
            exit 1
          fi

          echo "Using test binary: $TEST_BINARY"

          # Export to LCOV format
          llvm-cov export \
            --format=lcov \
            --instr-profile=default.profdata \
            "$TEST_BINARY" \
            > coverage.lcov

          echo "Generated coverage.lcov ($(du -h coverage.lcov | cut -f1))"
          echo "Coverage collection complete!"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: test/SingleTargetPackage/coverage.lcov
          flags: wasm
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
