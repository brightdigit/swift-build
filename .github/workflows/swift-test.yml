name: Swift Package Tests

on:
  push

jobs:
  # Matrix Strategy Note:
  # - macOS tests use explicit include entries due to complex platform configurations
  #   (SwiftPM, macos, ios, watchos, tvos, visionos) with varying parameters
  # - Ubuntu and Windows tests use matrix dimensions for their uniform configurations
  # This intentional difference optimizes readability and maintainability for each platform

  test-single-target-macos:
    name: Test Single Target Package (macOS)
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          # SwiftPM Build Matrix
          - runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"

          # SwiftPM Build-Only Matrix
          - runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"
            build-only: "true"

          # macOS Build Matrix
          - type: macos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"

          # macOS Build-Only Matrix
          - type: macos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"
            build-only: "true"

          # iOS Build Matrix
          - type: ios
            runs-on: macos-14
            xcode: "/Applications/Xcode_15.1.app"
            deviceName: "iPhone 15"
            osVersion: "17.5"

          # iOS Build-Only Matrix
          - type: ios
            runs-on: macos-14
            xcode: "/Applications/Xcode_15.4.app"
            deviceName: "iPhone 15"
            osVersion: "17.5"
            build-only: "true"

          - type: ios
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "iPhone 16 Pro"
            osVersion: "18.5"
            use-xcbeautify: "true"

          - type: ios
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.4.app"
            deviceName: "iPhone 17 Pro"
            osVersion: "26.4"
            download-platform: "true"
            use-xcbeautify: "true"
            xcbeautify-renderer: "github-actions"

          - type: watchos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple Watch Ultra 2 (49mm)"
            osVersion: "11.5"

          - type: watchos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.4.app"
            deviceName: "Apple Watch Ultra 3 (49mm)"
            osVersion: "26.4"
            download-platform: "true"
            use-xcbeautify: "true"
            xcbeautify-renderer: "azure-devops-pipelines"

          - type: visionos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple Vision Pro"
            osVersion: "2.5"

          - type: tvos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple TV 4K (3rd generation)"
            osVersion: "18.5"

          - type: tvos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.4.app"
            deviceName: "Apple TV 4K (3rd generation)"
            osVersion: "26.4"
            download-platform: "true"
            use-xcbeautify: "true"
            xcbeautify-renderer: "github-actions"
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/SingleTargetPackage
          scheme: SingleTargetPackage
          type: ${{ matrix.type }}
          xcode: ${{ matrix.xcode }}
          deviceName: ${{ matrix.deviceName }}
          osVersion: ${{ matrix.osVersion }}
          download-platform: ${{ matrix['download-platform'] || 'false' }}
          use-xcbeautify: ${{ matrix['use-xcbeautify'] }}
          xcbeautify-renderer: ${{ matrix['xcbeautify-renderer'] }}
          skip-package-resolved: "true"
          build-only: ${{ matrix['build-only'] || 'false' }}
      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == 'true'
        working-directory: test/SingleTargetPackage
        shell: bash
        run: |
          if [ -z "${{ matrix.type }}" ]; then
            ../../scripts/verify-build-only.sh spm .
          else
            ../../scripts/verify-build-only.sh xcode .
          fi

  test-multi-target-macos:
    name: Test Multi-Target Package (macOS)
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          # SwiftPM Build Matrix
          - runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"
            xcbeautify-renderer: "github-actions"

          # SwiftPM Build-Only Matrix
          - runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"
            build-only: "true"

          # macOS Build Matrix
          - type: macos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"

          # iOS Build Matrix
          - type: ios
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "iPhone 16 Pro"
            osVersion: "18.5"
            use-xcbeautify: "true"
            xcbeautify-renderer: "github-actions"

          - type: ios
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.4.app"
            deviceName: "iPhone 17 Pro"
            osVersion: "26.4"
            download-platform: "true"
            use-xcbeautify: "true"
            xcbeautify-renderer: "github-actions"

          - type: watchos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple Watch Ultra 2 (49mm)"
            osVersion: "11.5"

          - type: watchos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.4.app"
            deviceName: "Apple Watch Ultra 3 (49mm)"
            osVersion: "26.4"
            download-platform: "true"
            use-xcbeautify: "true"
            xcbeautify-renderer: "azure-devops-pipelines"

          - type: visionos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple Vision Pro"
            osVersion: "2.5"

          - type: tvos
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "Apple TV 4K (3rd generation)"
            osVersion: "18.5"

          - type: tvos
            runs-on: macos-26
            xcode: "/Applications/Xcode_26.4.app"
            deviceName: "Apple TV 4K (3rd generation)"
            osVersion: "26.4"
            download-platform: "true"
            use-xcbeautify: "true"
            xcbeautify-renderer: "github-actions"
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/MultiTargetPackage
          scheme: MultiTargetPackage-Package
          type: ${{ matrix.type }}
          xcode: ${{ matrix.xcode }}
          deviceName: ${{ matrix.deviceName }}
          osVersion: ${{ matrix.osVersion }}
          download-platform: ${{ matrix['download-platform'] || 'false' }}
          use-xcbeautify: ${{ matrix['use-xcbeautify'] }}
          xcbeautify-renderer: ${{ matrix['xcbeautify-renderer'] }}
          skip-package-resolved: "true"
          build-only: ${{ matrix['build-only'] || 'false' }}
      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == 'true'
        working-directory: test/MultiTargetPackage
        shell: bash
        run: |
          if [ -z "${{ matrix.type }}" ]; then
            ../../scripts/verify-build-only.sh spm .
          else
            ../../scripts/verify-build-only.sh xcode .
          fi

  test-mixed-framework-macos:
    name: Test Mixed-Framework Package (macOS)
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          # SwiftPM Build Matrix
          - runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            use-xcbeautify: "true"

          # iOS Build Matrix (one platform for Xcode testing)
          - type: ios
            runs-on: macos-15
            xcode: "/Applications/Xcode_16.4.app"
            deviceName: "iPhone 16 Pro"
            osVersion: "18.5"
            use-xcbeautify: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/MixedFrameworkPackage
          scheme: MixedFrameworkPackage-Package
          type: ${{ matrix.type }}
          xcode: ${{ matrix.xcode }}
          deviceName: ${{ matrix.deviceName }}
          osVersion: ${{ matrix.osVersion }}
          download-platform: ${{ matrix['download-platform'] || 'false' }}
          use-xcbeautify: ${{ matrix['use-xcbeautify'] }}
          skip-package-resolved: "true"
          save-test-output: 'true'

      - name: Upload test output
        # Only upload for one SPM job and one Xcode (ios type) job
        if: matrix.build-only != 'true' && matrix.runs-on == 'macos-15' && (matrix.type == null || matrix.type == 'ios')
        uses: actions/upload-artifact@v7
        with:
          name: test-output-macos-${{ matrix.type || 'spm' }}
          path: ${{ runner.temp }}/test-output.txt
          retention-days: 1

  test-single-target-ubuntu:
    name: Test Single Target Package (Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
          - "5.9"
          - "5.10"
          - "6.0"
          - "6.1"
          - "6.2"
          - "6.3"
        ubuntu:
          - jammy
          - noble
        nightly:
          - false
          - true
        build-only:
          - false
          - true
        exclude:
          - swift: 5.9
            ubuntu: noble
          - swift: 5.9
            nightly: true
          - swift: 5.10
            nightly: true
          - swift: 6.0
            nightly: true
          - swift: 6.1
            nightly: true            
          - swift: 6.3
            nightly: false
          # Only test build-only for one swift version per ubuntu to reduce test matrix
          - swift: 5.9
            build-only: true
          - swift: 5.10
            build-only: true
          - swift: 6.0
            build-only: true
          - swift: 6.1
            build-only: true
          - swift: 6.3
            build-only: true
    container:
      image: ${{ matrix.nightly && format('swiftlang/swift:nightly-{0}-{1}', matrix.swift, matrix.ubuntu) || format('swift:{0}-{1}', matrix.swift, matrix.ubuntu) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/SingleTargetPackage
          scheme: SingleTargetPackage
          use-xcbeautify: "true"
          skip-package-resolved: "true"
          build-only: ${{ matrix['build-only'] || 'false' }}
      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == true
        working-directory: test/SingleTargetPackage
        shell: bash
        run: ../../scripts/verify-build-only.sh spm .

  test-multi-target-ubuntu:
    name: Test Multi-Target Package (Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
          - "6.1"
          - "6.2"
          - "6.3"
        ubuntu:
          - jammy
          - noble
        nightly:
          - false
          - true
        exclude:
          - swift: 6.3
            nightly: false
    container:
      image: ${{ matrix.nightly && format('swiftlang/swift:nightly-{0}-{1}', matrix.swift, matrix.ubuntu) || format('swift:{0}-{1}', matrix.swift, matrix.ubuntu) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/MultiTargetPackage
          scheme: MultiTargetPackage
          xcbeautify-renderer: "github-actions"
          skip-package-resolved: "true"
          build-only: ${{ matrix['build-only'] || 'false' }}
      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == true
        working-directory: test/MultiTargetPackage
        shell: bash
        run: ../../scripts/verify-build-only.sh spm .
  test-mixed-framework-ubuntu:
    name: Test Mixed-Framework Package (Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
          - "6.1"
          - "6.2"
          - "6.3"
        ubuntu:
          - jammy
          - noble
        nightly:
          - false
          - true
        exclude:
          - swift: 6.3
            nightly: false
    container:
      image: ${{ matrix.nightly && format('swiftlang/swift:nightly-{0}-{1}', matrix.swift, matrix.ubuntu) || format('swift:{0}-{1}', matrix.swift, matrix.ubuntu) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/MixedFrameworkPackage
          scheme: MixedFrameworkPackage
          use-xcbeautify: "true"
          skip-package-resolved: "true"
          save-test-output: 'true'

      - name: Upload test output
        # Only upload for Swift 6.2 on noble (non-nightly)
        if: matrix.swift == '6.2' && matrix.ubuntu == 'noble' && matrix.nightly == false
        uses: actions/upload-artifact@v7
        with:
          name: test-output-ubuntu
          path: ${{ runner.temp }}/test-output.txt
          retention-days: 1

  test-single-target-windows:
    name: Test Single Target Package (Windows - Swift ${{ matrix.swift-version }}, ${{ matrix.runs-on }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [windows-2022, windows-2025]
        build-only: [false, true]
        swift-version: ['6.2.3', '6.1']
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/SingleTargetPackage
          scheme: SingleTargetPackage
          windows-swift-version: swift-${{ matrix.swift-version }}-release
          windows-swift-build: ${{ matrix.swift-version }}-RELEASE
          use-xcbeautify: "true"
          skip-package-resolved: "true"
          build-only: ${{ matrix['build-only'] || 'false' }}
      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == true
        working-directory: test/SingleTargetPackage
        shell: bash
        run: ../../scripts/verify-build-only.sh windows . 

  test-multi-target-windows:
    name: Test Multi-Target Package (Windows - Swift ${{ matrix.swift-version }}, ${{ matrix.runs-on }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [windows-2022, windows-2025]
        build-only: [false, true]
        swift-version: ['6.2.3', '6.1']
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/MultiTargetPackage
          scheme: MultiTargetPackage-Package
          windows-swift-version: swift-${{ matrix.swift-version }}-release
          windows-swift-build: ${{ matrix.swift-version }}-RELEASE
          use-xcbeautify: "true"
          build-only: ${{ matrix['build-only'] || 'false' }}
          skip-package-resolved: "true"
      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == true
        working-directory: test/MultiTargetPackage
        shell: bash
        run: ../../scripts/verify-build-only.sh windows .

  test-mixed-framework-windows:
    name: Test Mixed-Framework Package (Windows - Swift ${{ matrix.swift-version }})
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        swift-version: ['6.2.3']
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/MixedFrameworkPackage
          scheme: MixedFrameworkPackage-Package
          windows-swift-version: swift-${{ matrix.swift-version }}-release
          windows-swift-build: ${{ matrix.swift-version }}-RELEASE
          use-xcbeautify: "true"
          skip-package-resolved: "true"
          save-test-output: 'true'

      - name: Upload test output
        uses: actions/upload-artifact@v7
        with:
          name: test-output-windows
          path: ${{ runner.temp }}/test-output.txt
          retention-days: 1

  test-dependency-package-resolved-v3-success:
    name: Test Dependency Package (Ubuntu, Swift 5.10+)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
          - "5.10"
          - "6.0"
          - "6.1"
          - "6.2"
          - "6.3"
        ubuntu:
          - jammy
          - noble
        nightly:
          - false
          - true
        exclude:
          # Swift 5.10 not available on noble
          - swift: "5.10"
            ubuntu: noble
          # No nightly builds for older versions
          - swift: "5.10"
            nightly: true
          - swift: 6.0
            nightly: true
          - swift: 6.1
            nightly: true
          - swift: 6.2
            nightly: true
          # Only 6.2 has nightly
          - swift: 6.3
            nightly: false
    container:
      image: ${{ matrix.nightly && format('swiftlang/swift:nightly-{0}-{1}', matrix.swift, matrix.ubuntu) || format('swift:{0}-{1}', matrix.swift, matrix.ubuntu) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          use-xcbeautify: "true"

  test-dependency-package-resolved-v3-failure:
    name: Test Dependency Package (Ubuntu, Swift 5.9 strict - EXPECTED TO FAIL)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
          - "5.9"
        ubuntu:
          - jammy
          - focal
    container:
      image: swift:${{ matrix.swift }}-${{ matrix.ubuntu }}
    steps:
      - uses: actions/checkout@v6
      - name: Test strict mode (expect failure)
        id: strict-test
        continue-on-error: true
        uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          use-xcbeautify: "true"
      - name: Verify test failed as expected
        if: always() && steps.strict-test.outcome == 'failure'
        run: |
          echo "Test failed as expected with Swift 5.9 and Package.resolved v3 incompatibility ✓"
      - name: Verify expected failure (not success)
        if: always() && steps.strict-test.outcome == 'success'
        run: |
          echo "ERROR: Expected strict mode to fail with Swift 5.9 and Package.resolved v3, but it succeeded"
          exit 1
      - name: Handle unexpected outcome
        if: always() && steps.strict-test.outcome != 'success' && steps.strict-test.outcome != 'failure'
        run: |
          echo "ERROR: Unexpected test outcome: ${{ steps.strict-test.outcome }}"
          exit 1

  test-dependency-package-resolved-v3-floating:
    name: Test Dependency Package (Ubuntu, Swift 5.x floating)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift:
          - "5.9"
          - "5.10"
        ubuntu:
          - jammy
          - focal
    container:
      image: swift:${{ matrix.swift }}-${{ matrix.ubuntu }}
    steps:
      - uses: actions/checkout@v6
      - name: Test floating mode (expect success)
        uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          use-xcbeautify: "true"
          skip-package-resolved: "true"

  test-dependency-package-windows:
    name: Test Dependency Package (Windows - Swift ${{ matrix.swift-version }}, ${{ matrix.runs-on }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [windows-2022, windows-2025]
        swift-version: ['6.2.3', '6.1']
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage-Package
          windows-swift-version: swift-${{ matrix.swift-version }}-release
          windows-swift-build: ${{ matrix.swift-version }}-RELEASE
          use-xcbeautify: "true"
          skip-package-resolved: "false"

  test-dependency-package-macos:
    name: Test Dependency Package (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          xcode: "/Applications/Xcode_16.4.app"
          use-xcbeautify: "true"
          skip-package-resolved: "false"

  test-single-target-android:
    name: Test Single Target Package (Android)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu runner with Android emulator testing
          - android-swift-version: "6.2"
            android-api-level: "28"
            android-run-tests: "true"
            build-only: false

          # Ubuntu runner with Android build-only mode
          - android-swift-version: "6.2"
            android-api-level: "28"
            android-run-tests: "true"
            build-only: true
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space (Ubuntu)
        if: matrix.build-only == false
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: ./
        with:
          working-directory: test/SingleTargetPackage
          scheme: SingleTargetPackage
          type: android
          android-swift-version: ${{ matrix.android-swift-version }}
          android-api-level: ${{ matrix.android-api-level }}
          android-run-tests: ${{ matrix.android-run-tests }}
          skip-package-resolved: "true"
          build-only: ${{ matrix.build-only }}

      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == true
        working-directory: test/SingleTargetPackage
        shell: bash
        run: ../../scripts/verify-build-only.sh android .

  test-multi-target-android:
    name: Test Multi-Target Package (Android)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu runner with Android emulator testing
          - android-swift-version: "6.2"
            android-api-level: "28"
            android-run-tests: "true"
            build-only: false

          # Ubuntu runner with build-only mode
          - android-swift-version: "6.2"
            android-api-level: "28"
            android-run-tests: "true"
            build-only: true
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space (Ubuntu)
        if: matrix.build-only == false
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: ./
        with:
          working-directory: test/MultiTargetPackage
          scheme: MultiTargetPackage-Package
          type: android
          android-swift-version: ${{ matrix.android-swift-version }}
          android-api-level: ${{ matrix.android-api-level }}
          android-run-tests: ${{ matrix.android-run-tests }}
          skip-package-resolved: "true"
          build-only: ${{ matrix.build-only }}

      - name: Verify tests were not run (build-only mode)
        if: matrix.build-only == true
        working-directory: test/MultiTargetPackage
        shell: bash
        run: ../../scripts/verify-build-only.sh android .

  test-mixed-framework-android:
    name: Test Mixed-Framework Package (Android)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - android-swift-version: "6.2"
            android-api-level: "28"
            android-run-tests: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: ./
        with:
          working-directory: test/MixedFrameworkPackage
          scheme: MixedFrameworkPackage-Package
          type: android
          android-swift-version: ${{ matrix.android-swift-version }}
          android-api-level: ${{ matrix.android-api-level }}
          android-run-tests: ${{ matrix.android-run-tests }}
          skip-package-resolved: "true"

  test-android-auto-detection:
    name: Test Android Auto-Detection
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Auto-detect from android-swift-version
          - name: "Auto-detect from swift-version"
            android-swift-version: "6.3"
            android-run-tests: "false"

          # Auto-detect from android-api-level
          - name: "Auto-detect from api-level"
            android-api-level: "31"
            android-run-tests: "false"

          # Auto-detect from android-ndk-version
          # DISABLED: Bug in swift-android-action when custom ndk-version is specified
          # See: https://github.com/skiptools/swift-android-action/issues/9
          # - name: "Auto-detect from ndk-version"
          #   android-ndk-version: "26.1.10909125"
          #   android-run-tests: "false"

          # Auto-detect from android-run-tests
          - name: "Auto-detect from run-tests"
            android-run-tests: "false"

          # Auto-detect from android-swift-build-flags
          - name: "Auto-detect from build-flags"
            android-swift-build-flags: "-v"
            android-run-tests: "false"

          # Auto-detect from android-emulator-boot-timeout
          - name: "Auto-detect from boot-timeout"
            android-emulator-boot-timeout: "900"
            android-run-tests: "false"
    steps:
      - uses: actions/checkout@v6

      # Install custom NDK version if specified
      - name: Install Android NDK ${{ matrix.android-ndk-version }}
        if: matrix.android-ndk-version
        run: |
          echo "Installing Android NDK ${{ matrix.android-ndk-version }}"
          echo "y" | sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ matrix.android-ndk-version }}"

      - name: Test Android Auto-Detection - ${{ matrix.name }}
        uses: ./
        with:
          working-directory: test/SingleTargetPackage
          scheme: SingleTargetPackage
          # NOTE: type is NOT set - should auto-detect Android
          android-swift-version: ${{ matrix.android-swift-version }}
          android-api-level: ${{ matrix.android-api-level }}
          android-ndk-version: ${{ matrix.android-ndk-version }}
          android-run-tests: ${{ matrix.android-run-tests }}
          android-swift-build-flags: ${{ matrix.android-swift-build-flags }}
          android-emulator-boot-timeout: ${{ matrix.android-emulator-boot-timeout }}
          skip-package-resolved: "true"
          build-only: true

      - name: Verify Android build was executed
        shell: bash
        run: |
          echo "✓ Android auto-detection test passed: ${{ matrix.name }}"
          echo "Android build was successfully auto-detected and executed"

  test-explicit-type-precedence:
    name: Test Explicit Type Precedence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test that explicit type wins over Android parameters
        uses: ./
        with:
          working-directory: test/SingleTargetPackage
          scheme: SingleTargetPackage
          type: macos
          # These Android params should be IGNORED since type is explicitly set to macos
          android-api-level: "31"
          android-run-tests: "false"
          skip-package-resolved: "true"

      - name: Verify SwiftPM build was used (not Android)
        shell: bash
        run: |
          echo "✓ Explicit type precedence test passed"
          echo "Android parameters were correctly ignored when type=macos was set"

  test-dependency-package-android:
    name: Test Dependency Package (Android)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - android-swift-version: "6.2"
            android-api-level: "28"
            android-run-tests: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          type: android
          android-swift-version: ${{ matrix.android-swift-version }}
          android-api-level: ${{ matrix.android-api-level }}
          android-run-tests: ${{ matrix.android-run-tests }}
          skip-package-resolved: "false"

  test-cache-behavior-strict:
    name: Test Cache Behavior (strict mode)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1-jammy
    steps:
      - uses: actions/checkout@v6

      # First build with Package.resolved (strict mode)
      - name: First build (strict mode)
        uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          skip-package-resolved: "false"

      # Second build should hit cache
      - name: Second build (should hit cache)
        uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          skip-package-resolved: "false"

  test-cache-behavior-floating:
    name: Test Cache Behavior (floating mode)
    runs-on: ubuntu-latest
    container:
      image: swift:6.1-jammy
    steps:
      - uses: actions/checkout@v6

      # Remove Package.resolved for floating dependencies test
      - name: Remove Package.resolved
        run: rm -f test/DependencyPackage/Package.resolved

      # First build without Package.resolved (floating mode)
      - name: First build (floating mode)
        uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          skip-package-resolved: "true"

      # Second build should hit cache with 'no-resolved' key
      - name: Second build (should hit cache)
        uses: ./
        with:
          working-directory: test/DependencyPackage
          scheme: DependencyPackage
          skip-package-resolved: "true"

