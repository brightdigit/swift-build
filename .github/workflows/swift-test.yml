  test-mixed-framework-wasm:
    name: Test Mixed-Framework Package (Wasm)
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # WasmKit (default) - Ubuntu with Wasm-embedded
          - runs-on: ubuntu-latest
            container: swift:6.2-jammy
            type: wasm-embedded
            build-only: false

          # WasmKit (default) - Ubuntu with Wasm (Swift 6.2)
          - runs-on: ubuntu-latest
            container: swift:6.2-jammy
            swift-version: "6.2"
            type: wasm
            build-only: false

          # WasmKit (default) - Ubuntu with Wasm (Swift 6.3)
          - runs-on: ubuntu-latest
            container: swift:6.3-jammy
            swift-version: "6.3"
            type: wasm
            build-only: false

          # WasmKit (default) - macOS 26 with Wasm
          - runs-on: macos-26
            xcode: "/Applications/Xcode_26.4.app"
            type: wasm
            build-only: false

          # Wasmtime fallback - Ubuntu with WASM
          - runs-on: ubuntu-latest
            container: swift:6.2-jammy
            type: wasm
            wasmtime-version: '27.0.0'
            build-only: false
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          working-directory: test/MixedFrameworkPackage
          scheme: MixedFrameworkPackage-Package
          type: ${{ matrix.type }}
          xcode: ${{ matrix.xcode }}
          skip-package-resolved: "true"
          wasm-swift-flags: ${{ matrix.wasm-swift-flags }}
          wasmtime-version: ${{ matrix.wasmtime-version }}
          build-only: ${{ matrix.build-only }}
          save-test-output: 'true'

      - name: Upload test output
        # Only upload for Ubuntu + wasm + WasmKit (no wasmtime-version)
        if: matrix.build-only != true && matrix.runs-on == 'ubuntu-latest' && matrix.type == 'wasm' && !matrix.wasmtime-version
        uses: actions/upload-artifact@v7
        with:
          name: test-output-wasm-${{ matrix.swift-version }}
          path: |
            ${{ runner.temp }}/wasm-xctest-output.txt
            ${{ runner.temp }}/wasm-swift-testing-output.txt
          retention-days: 1

  validate-mixed-framework-test-counts:
    name: Validate MixedFrameworkPackage Test Counts
    runs-on: ubuntu-latest
    needs:
      - test-mixed-framework-macos
      - test-mixed-framework-ubuntu
      - test-mixed-framework-windows
      - test-mixed-framework-wasm
    if: always()  # Run even if some tests failed
    env:
      EXPECTED_XCTEST: 8
      EXPECTED_SWIFT_TESTING: 9
    steps:
      - uses: actions/checkout@v6

      - name: Download all test outputs
        uses: actions/download-artifact@v8
        with:
          pattern: test-output-*
          path: test-outputs

      - name: List downloaded artifacts
        run: |
          echo "Downloaded test outputs:"
          find test-outputs -type f -name "*.txt" | sort

      - name: Validate combined outputs (SPM, Xcode, Ubuntu, Windows)
        run: |
          echo "Validating combined test outputs..."
          find test-outputs -type f -name "test-output.txt" | while read file; do
            echo "Validating: $file"
            cat "$file" | ./scripts/validate-test-output.sh combined $EXPECTED_XCTEST $EXPECTED_SWIFT_TESTING
          done

      - name: Validate Wasm XCTest outputs
        run: |
          echo "Validating Wasm XCTest outputs..."
          find test-outputs -type f -name "wasm-xctest-output.txt" | while read file; do
            echo "Validating: $file"
            cat "$file" | ./scripts/validate-test-output.sh xctest-only $EXPECTED_XCTEST
          done

      - name: Validate Wasm Swift Testing outputs
        run: |
          echo "Validating Wasm Swift Testing outputs..."
          find test-outputs -type f -name "wasm-swift-testing-output.txt" | while read file; do
            echo "Validating: $file"
            cat "$file" | ./scripts/validate-test-output.sh swift-testing-only $EXPECTED_SWIFT_TESTING
          done

      - name: Summary
        if: success()
        run: |
          echo "✅ All MixedFrameworkPackage test counts validated successfully!"
          echo ""
          echo "Validated platforms:"
          echo "  - macOS (SPM + Xcode)"
          echo "  - Ubuntu"
          echo "  - Windows"
          echo "  - Wasm"
          echo ""
          echo "All tests ran: 17 tests (8 XCTest + 9 Swift Testing)"
